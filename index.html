  <style>
/* ===========================================================
   Escala Kids — Verbo Casa Caiada
   Paleta: céu / branco, clima leve, app de uso diário
   =========================================================== */
:root{
  --sky-50:#F2F9FF;
  --sky-100:#EAF4FC;
  --sky-200:#D4E9F9;
  --sky-300:#A9D2F2;
  --sky-400:#6CB8F2;
  --sky-500:#4DA3E8;
  --sky-600:#2E86D6;
  --ink:#143B57;
  --ink-soft:#3D6480;
  --ink-faint:#7C9AB0;
  --paper:#FBFCFE;
  --card:#FFFFFF;
  --line:#E4EEF7;
  --sun:#FFD66B;
  --sun-soft:#FFF4D6;
  --good:#3FBF8F;
  --good-soft:#E2F6EE;
  --warn:#F2994A;
  --danger:#EB6B6B;
  --danger-soft:#FBE7E7;
  --shadow-sm:0 2px 8px rgba(46,134,214,.08);
  --shadow-md:0 8px 24px rgba(46,134,214,.12);
  --shadow-lg:0 16px 40px rgba(20,59,87,.16);
  --r-sm:12px; --r-md:18px; --r-lg:24px; --r-xl:30px;
  --font-display:"Quicksand",system-ui,sans-serif;
  --font-body:"Inter",system-ui,sans-serif;
  --tab-h:68px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:
    radial-gradient(1200px 480px at 50% -8%, var(--sky-100), transparent 60%),
    var(--paper);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
h1,h2,h3{font-family:var(--font-display);font-weight:700;margin:0;color:var(--ink)}

#app{max-width:520px;margin:0 auto;min-height:100dvh;position:relative}

/* ---------- Topbar ---------- */
.topbar{
  position:sticky;top:0;z-index:30;
  padding-top:var(--safe-t);
  background:linear-gradient(180deg, var(--sky-500), var(--sky-400));
  color:#fff;
  border-radius:0 0 var(--r-xl) var(--r-xl);
  box-shadow:var(--shadow-md);
}
.topbar-inner{
  display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
  padding:18px 20px 22px;
}
.topbar-eyebrow{
  font-family:var(--font-display);font-weight:600;font-size:12.5px;
  letter-spacing:.04em;opacity:.85;display:block;margin-bottom:2px;
}
.topbar-title{font-size:25px;color:#fff;line-height:1.1}
.topbar-actions{display:flex;gap:8px}
.topbar .icon-btn{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.18);color:#fff;
  display:grid;place-items:center;backdrop-filter:blur(4px);
}
.topbar .icon-btn svg{width:21px;height:21px}
.topbar .icon-btn:active{transform:scale(.92)}

/* ---------- Content ---------- */
.content{
  padding:18px 16px calc(var(--tab-h) + var(--safe-b) + 26px);
  animation:fade .28s ease both;
}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- Tabbar ---------- */
.tabbar{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:0;width:100%;max-width:520px;z-index:40;
  height:calc(var(--tab-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  display:grid;grid-template-columns:repeat(5,1fr);
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  box-shadow:0 -6px 24px rgba(20,59,87,.06);
}
.tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--ink-faint);font-family:var(--font-display);font-weight:600;font-size:11px;
  position:relative;transition:color .18s;
}
.tab svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.9;
  stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.tab.is-active{color:var(--sky-600)}
.tab.is-active svg{transform:translateY(-1px) scale(1.06)}
.tab.is-active::before{
  content:"";position:absolute;top:8px;width:32px;height:32px;border-radius:50%;
  background:var(--sky-100);z-index:-1;animation:pop .2s ease}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}

/* ---------- Cards & blocks ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);
  box-shadow:var(--shadow-sm)}
.section-label{font-family:var(--font-display);font-weight:700;font-size:13px;
  letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;
  margin:22px 4px 10px;display:flex;align-items:center;justify-content:space-between}
.section-label .link{color:var(--sky-600);font-size:13px;text-transform:none;letter-spacing:0}

/* Hero hoje */
.today{
  background:linear-gradient(135deg,#fff,var(--sky-50));
  border:1px solid var(--sky-200);border-radius:var(--r-lg);
  padding:18px;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.today::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;
  border-radius:50%;background:var(--sun-soft);opacity:.7}
.today-date{display:flex;align-items:center;gap:10px;position:relative}
.today-sun{width:38px;height:38px;border-radius:12px;background:var(--sun-soft);
  display:grid;place-items:center;color:#E9A93A;flex:none}
.today-sun svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.today-day{font-family:var(--font-display);font-weight:700;font-size:17px;text-transform:capitalize}
.today-sub{font-size:13px;color:var(--ink-soft)}
.today-event{margin-top:14px;font-family:var(--font-display);font-weight:700;font-size:16px;
  color:var(--sky-600);position:relative}
.today-empty{margin-top:12px;font-size:13.5px;color:var(--ink-soft);position:relative}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);
  padding:14px 10px;text-align:center;box-shadow:var(--shadow-sm)}
.stat b{font-family:var(--font-display);font-size:24px;display:block;color:var(--sky-600);line-height:1}
.stat span{font-size:11.5px;color:var(--ink-soft);font-weight:500}

/* Room cards */
.room{display:flex;align-items:center;gap:13px;padding:14px;border-radius:var(--r-md);
  background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow-sm);
  margin-bottom:10px;transition:transform .15s}
.room:active{transform:scale(.99)}
.room-ico{width:46px;height:46px;border-radius:14px;flex:none;display:grid;place-items:center;
  font-size:22px}
.room-info{flex:1;min-width:0}
.room-name{font-family:var(--font-display);font-weight:700;font-size:15.5px}
.room-age{font-size:12.5px;color:var(--ink-soft)}
.room-count{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;
  color:var(--ink-soft);white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--good)}
.dot.low{background:var(--warn)}.dot.empty{background:var(--danger)}

/* Avatars */
.ava{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
  font-family:var(--font-display);font-weight:700;font-size:13px;color:#fff;flex:none;
  border:2px solid #fff}
.ava-row{display:flex}
.ava-row .ava:not(:first-child){margin-left:-10px}
.ava-more{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
  background:var(--sky-100);color:var(--sky-600);font-weight:700;font-size:12px;
  border:2px solid #fff;margin-left:-10px}

/* Member list */
.person{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);
  border:1px solid var(--line);border-radius:var(--r-md);margin-bottom:9px;box-shadow:var(--shadow-sm)}
.person-info{flex:1;min-width:0}
.person-name{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:7px}
.person-meta{font-size:12px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;
  padding:2px 9px;border-radius:999px;background:var(--sky-100);color:var(--sky-600)}
.chip.muted{background:#EEF2F6;color:var(--ink-faint)}
.chip.sun{background:var(--sun-soft);color:#B9831F}
.chip.good{background:var(--good-soft);color:#1F8A63}

/* Schedule day groups */
.sched-day{margin-bottom:18px}
.sched-head{display:flex;align-items:center;justify-content:space-between;margin:0 4px 9px}
.sched-date{font-family:var(--font-display);font-weight:700;font-size:15px}
.sched-when{font-size:12px;color:var(--ink-soft)}
.sched-room{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:14px;
  background:var(--card);border:1px solid var(--line);margin-bottom:7px}
.sched-room .room-ico{width:38px;height:38px;border-radius:11px;font-size:18px}
.sched-room-names{flex:1;min-width:0;font-size:13px;color:var(--ink-soft)}
.sched-room-title{font-weight:600;font-size:13.5px;color:var(--ink);margin-bottom:1px}

/* Calendar */
.cal{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:14px;box-shadow:var(--shadow-sm)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-family:var(--font-display);font-weight:700;font-size:17px;text-transform:capitalize}
.cal-nav{display:flex;gap:6px}
.cal-nav button{width:36px;height:36px;border-radius:11px;background:var(--sky-50);
  color:var(--sky-600);display:grid;place-items:center}
.cal-nav button:active{background:var(--sky-100)}
.cal-nav svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-wd{text-align:center;font-size:11px;font-weight:700;color:var(--ink-faint);padding:4px 0}
.cal-cell{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:13.5px;font-weight:500;
  color:var(--ink);position:relative;border:1px solid transparent}
.cal-cell.muted{color:var(--sky-200)}
.cal-cell.today{background:var(--sky-500);color:#fff;font-weight:700}
.cal-cell.has{background:var(--sky-50);border-color:var(--sky-200)}
.cal-cell.sel{outline:2px solid var(--sky-500);outline-offset:-2px}
.cal-cell .pip{position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--sky-500)}
.cal-cell.today .pip{background:#fff}
.cal-cell .pip.ev{background:var(--sun)}

/* Day detail */
.day-detail{margin-top:16px}
.event-line{display:flex;align-items:center;gap:11px;padding:13px;border-radius:14px;
  background:var(--card);border:1px solid var(--line);margin-bottom:8px;box-shadow:var(--shadow-sm)}
.event-tag{width:6px;align-self:stretch;border-radius:6px;flex:none}
.event-info{flex:1}
.event-title{font-weight:600;font-size:14.5px}
.event-time{font-size:12.5px;color:var(--ink-soft)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--font-display);font-weight:700;font-size:15px;
  padding:13px 18px;border-radius:14px;transition:transform .12s,box-shadow .2s}
.btn:active{transform:scale(.97)}
.btn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:var(--sky-500);color:#fff;box-shadow:0 6px 16px rgba(77,163,232,.35)}
.btn-primary:active{background:var(--sky-600)}
.btn-ghost{background:var(--sky-50);color:var(--sky-600)}
.btn-soft{background:#fff;color:var(--ink-soft);border:1px solid var(--line)}
.btn-danger{background:var(--danger-soft);color:var(--danger)}
.btn-wa{background:var(--good);color:#fff;box-shadow:0 6px 16px rgba(63,191,143,.32)}
.btn-block{width:100%}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn-row .btn{flex:1}

.fab{position:fixed;right:max(18px,calc(50% - 260px + 18px));
  bottom:calc(var(--tab-h) + var(--safe-b) + 16px);z-index:35;
  width:56px;height:56px;border-radius:20px;background:var(--sky-500);color:#fff;
  display:grid;place-items:center;box-shadow:var(--shadow-lg)}
.fab svg{width:26px;height:26px;fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round}
.fab:active{transform:scale(.92)}

.icon-btn{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:var(--ink-soft)}
.icon-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-btn.sm{width:34px;height:34px;border-radius:10px}
.icon-btn.sm svg{width:17px;height:17px}

/* Empty state */
.empty{text-align:center;padding:42px 24px;color:var(--ink-soft)}
.empty-emoji{font-size:42px;margin-bottom:10px}
.empty h3{color:var(--ink);font-size:17px;margin-bottom:5px}
.empty p{font-size:13.5px;margin:0 0 16px;line-height:1.5}

/* Forms */
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--font-display);font-weight:600;font-size:13px;
  color:var(--ink-soft);margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:13px;
  font-size:15px;color:var(--ink);background:var(--sky-50);transition:border-color .18s,background .18s}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--sky-400);background:#fff}
.field textarea{resize:vertical;min-height:64px}
.field .hint{font-size:11.5px;color:var(--ink-faint);margin-top:5px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Pick list (multi select rooms / members) */
.pick{display:flex;flex-wrap:wrap;gap:8px}
.pick-item{padding:8px 13px;border-radius:999px;font-size:13px;font-weight:600;
  border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
.pick-item.on{border-color:transparent;color:#fff}
.pick-item .pk-dot{width:9px;height:9px;border-radius:50%}

/* Toggle switch */
.toggle{display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px;background:var(--sky-50);border-radius:13px;margin-bottom:10px}
.toggle-label{font-size:14px;font-weight:500}
.sw{width:46px;height:27px;border-radius:999px;background:#CBD9E6;position:relative;transition:background .2s;flex:none}
.sw.on{background:var(--sky-500)}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;
  background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on::after{transform:translateX(19px)}

/* Modal */
.modal-backdrop{position:fixed;inset:0;z-index:60;background:rgba(20,59,87,.42);
  backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;
  animation:fadeBg .2s ease}
.modal-backdrop[hidden]{display:none}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);width:100%;max-width:520px;border-radius:var(--r-xl) var(--r-xl) 0 0;
  max-height:92dvh;display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.2,.9,.3,1) both;
  padding-bottom:var(--safe-b)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 6px;flex:none}
.modal-head::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:42px;height:4px;border-radius:99px;background:var(--sky-200)}
.modal-title{font-size:19px}
.modal-body{padding:8px 20px 4px;overflow-y:auto}
.modal-foot{padding:12px 20px 18px;flex:none}

/* Toast */
.toast{position:fixed;left:50%;bottom:calc(var(--tab-h) + var(--safe-b) + 20px);
  transform:translateX(-50%) translateY(20px);z-index:80;
  background:var(--ink);color:#fff;font-weight:600;font-size:14px;
  padding:13px 20px;border-radius:14px;box-shadow:var(--shadow-lg);opacity:0;
  transition:opacity .25s,transform .25s;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.good{background:var(--good)}
.toast.warn{background:var(--warn)}

/* Banner (notif permission) */
.banner{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:var(--r-md);
  background:var(--sun-soft);border:1px solid #F2DFA8;margin-bottom:14px}
.banner svg{width:24px;height:24px;flex:none;color:#C98E1E;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.banner-txt{flex:1;font-size:13px;color:#7A5A12;line-height:1.4}
.banner-txt b{color:#5E4407}

/* Misc */
.spacer{height:8px}
.muted-txt{color:var(--ink-soft);font-size:13.5px}
.divider{height:1px;background:var(--line);margin:16px 0}
.list-tap{cursor:pointer}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important}
}

/* ---------- Login ---------- */
.login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  padding:24px;background:
    radial-gradient(900px 500px at 50% -10%, var(--sky-200), transparent 60%),
    linear-gradient(180deg, var(--sky-100), var(--paper) 60%)}
.login[hidden]{display:none}
.login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r-xl);box-shadow:var(--shadow-lg);padding:30px 26px;text-align:center;
  animation:slideUp .35s cubic-bezier(.2,.9,.3,1) both}
.login-logo{width:84px;height:84px;border-radius:24px;object-fit:contain;background:#fff;
  box-shadow:var(--shadow-md);margin:0 auto 14px;display:block;border:1px solid var(--line)}
.login-card h1{font-size:23px;margin-bottom:2px}
.login-sub{color:var(--ink-soft);font-size:13.5px;margin:0 0 22px}
.login .field{text-align:left}
.login-btn-wrap{margin-top:6px}
.login-err{color:var(--danger);font-size:13px;font-weight:600;margin-top:12px;min-height:18px}
.login-note{margin-top:18px;font-size:11.5px;color:var(--ink-faint);line-height:1.5;
  background:var(--sky-50);border-radius:12px;padding:10px 12px}
.login-note b{color:var(--ink-soft)}
.logged-as{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--sky-50);border-radius:13px;margin-bottom:10px}
.logged-as .ava{width:38px;height:38px}
.logged-as .person-name{font-size:14px}

/* ============================================================
   TEMA MÍDIA — preto/cinza com detalhes em amarelo
   (sobrescreve o tema claro; cada subdepartamento tem sua cor)
   ============================================================ */
:root{
  --sky-50:#17171c; --sky-100:#1f1f25; --sky-200:#2b2b33; --sky-300:#3a3a44;
  --sky-400:#FFD23F; --sky-500:#FFCA1A; --sky-600:#F0B400;
  --ink:#F3F3F5; --ink-soft:#A6A6B0; --ink-faint:#6C6C77;
  --paper:#0D0D0F; --card:#18181D; --line:#2A2A32;
  --sun:#FFD23F; --sun-soft:#26230f;
  --good:#37C98E; --good-soft:#15241c; --danger:#FF6B6B; --danger-soft:#2a1717;
  --shadow-sm:0 2px 8px rgba(0,0,0,.35);
  --shadow-md:0 8px 24px rgba(0,0,0,.45);
  --shadow-lg:0 16px 40px rgba(0,0,0,.55);
}
body{ background: radial-gradient(1000px 460px at 50% -10%, #1d1d24, transparent 60%), var(--paper); color:var(--ink); }
.topbar{ background:linear-gradient(180deg,#1c1c22,#101015); box-shadow:var(--shadow-md); }
.topbar-eyebrow{ color:var(--sun); opacity:1; }
.topbar .icon-btn{ background:rgba(255,255,255,.10); }
.tabbar{ background:rgba(16,16,20,.92); border-top:1px solid var(--line); }
.tab.is-active{ color:var(--sun); }
.tab.is-active::before{ background:rgba(255,210,63,.14); }
.btn-primary{ background:var(--sun); color:#15151a; box-shadow:0 6px 16px rgba(255,210,63,.28); }
.btn-primary:active{ background:var(--sky-600); }
.btn-ghost{ background:var(--sky-100); color:var(--sun); }
.btn-soft{ background:var(--card); color:var(--ink-soft); border:1px solid var(--line); }
.fab{ background:var(--sun); color:#15151a; }
.stat b{ color:var(--sun); }
.section-label{ color:var(--ink-soft); }
.section-label .link{ color:var(--sun); }
.today{ background:linear-gradient(135deg,#1d1d24,#141419); border-color:var(--line); }
.today::after{ background:rgba(255,210,63,.08); }
.today-sun{ background:rgba(255,210,63,.14); color:var(--sun); }
.today-event{ color:var(--sun); }
.cal-nav button{ background:var(--sky-100); color:var(--sun); }
.cal-cell{ color:var(--ink); }
.cal-cell.muted{ color:#43434d; }
.cal-cell.today{ background:var(--sun); color:#15151a; }
.cal-cell.today .pip{ background:#15151a; }
.cal-cell.has{ background:var(--sky-100); border-color:var(--sky-300); }
.chip{ background:var(--sky-100); color:var(--sun); }
.chip.muted{ background:#23232a; color:var(--ink-faint); }
.chip.good{ background:var(--good-soft); color:#5FE0AC; }
.chip.sun{ background:var(--sun-soft); color:var(--sun); }
.field input,.field select,.field textarea{ background:#141419; color:var(--ink); border-color:var(--line); }
.field input:focus,.field select:focus,.field textarea:focus{ background:#1d1d23; border-color:var(--sun); }
.field input::placeholder,.field textarea::placeholder{ color:#55555f; }
.toggle{ background:var(--sky-100); }
.sw{ background:#3a3a44; }
.sw.on{ background:var(--sun); }
.pick-item{ background:var(--card); color:var(--ink-soft); border-color:var(--line); }
.modal{ background:var(--paper); }
.modal-backdrop{ background:rgba(0,0,0,.62); }
.modal-head::before{ background:var(--line); }
.toast{ background:#000; color:#fff; }
.toast.good{ background:var(--good); color:#06231a; }
.toast.warn{ background:var(--warn); }
.banner{ background:rgba(255,210,63,.08); border-color:rgba(255,210,63,.28); }
.banner svg{ color:var(--sun); }
.banner-txt{ color:#E9D9A6; }
.banner-txt b{ color:var(--sun); }
.login{ background: radial-gradient(800px 460px at 50% -10%, #1d1d24, transparent 60%), var(--paper); }
.login-logo{ background:#15151a; border-color:var(--line); }
.login-note{ background:var(--sky-100); }
.logged-as{ background:var(--sky-100); }
.divider{ background:var(--line); }

/* ---------- Botão de aviso (destaque pulsante) ---------- */
.btn-attn{ position:relative; font-size:16px; padding:15px 18px;
  animation:attnPulse 1.8s ease-in-out infinite; overflow:hidden; }
.btn-attn svg{ width:21px; height:21px; }
.btn-attn::after{ content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
  background:linear-gradient(100deg, transparent, rgba(255,255,255,.45), transparent);
  transform:skewX(-18deg); animation:attnShine 2.6s ease-in-out infinite; }
@keyframes attnPulse{
  0%,100%{ box-shadow:0 6px 16px rgba(63,191,143,.35); transform:translateZ(0) scale(1); }
  50%{ box-shadow:0 8px 26px rgba(63,191,143,.65), 0 0 0 5px rgba(63,191,143,.18); transform:translateZ(0) scale(1.02); }
}
@keyframes attnShine{
  0%,18%{ left:-60%; } 38%,100%{ left:140%; }
}
@media (prefers-reduced-motion:reduce){
  .btn-attn{ animation:none; } .btn-attn::after{ display:none; }
}

/* ---------- Card "É o seu dia" (destaque) ---------- */
.today-mine{ background:linear-gradient(135deg, rgba(55,201,142,.18), rgba(255,210,63,.06));
  border:1.5px solid rgba(55,201,142,.55); position:relative; overflow:hidden;
  animation:mineGlow 2s ease-in-out infinite; }
.today-mine::before{ content:"NO AR"; position:absolute; top:12px; right:14px; z-index:2;
  font-family:var(--font-display); font-weight:700; font-size:10px; letter-spacing:.08em;
  color:#06231a; background:#37C98E; padding:3px 8px; border-radius:999px; }
.today-mine::after{ content:""; position:absolute; top:0; left:-55%; width:45%; height:100%; z-index:1;
  background:linear-gradient(100deg, transparent, rgba(255,255,255,.14), transparent);
  transform:skewX(-18deg); animation:attnShine 3s ease-in-out infinite; }
.today-mine .today-date,.today-mine .today-event{ position:relative; z-index:2; }
.today-mine-ico{ background:rgba(55,201,142,.22) !important; color:#5FE0AC !important; }
.today-mine .today-day{ color:#EAFFF5; }
.today-mine-sub{ color:#9FE9C8 !important; }
.today-mine-ev{ color:#5FE0AC !important; font-weight:700; }
@keyframes mineGlow{
  0%,100%{ box-shadow:0 8px 24px rgba(0,0,0,.45), 0 0 0 0 rgba(55,201,142,0); }
  50%{ box-shadow:0 10px 30px rgba(0,0,0,.5), 0 0 24px 2px rgba(55,201,142,.5); }
}
@media (prefers-reduced-motion:reduce){ .today-mine{ animation:none; } .today-mine::after{ display:none; } }

/* ---------- Logo do login colado na página (mídia) ---------- */
.login-logo{ background:transparent !important; border:none !important; box-shadow:none !important;
  border-radius:0 !important; width:150px !important; height:auto !important; object-fit:contain;
  margin:0 auto 8px; filter:drop-shadow(0 8px 24px rgba(0,0,0,.5)); }

/* ---------- Avatar com foto ---------- */
.ava-photo{ background-size:cover; background-position:center; color:transparent; }

/* ============================================================
   ACCENT AZUL — troca o amarelo por um azul confortável
   (cores dos subdepartamentos permanecem; muda só o destaque)
   ============================================================ */
:root{
  --sky-400:#5AA0F5; --sky-500:#3D8BF0; --sky-600:#2C6FD1;
  --sun:#6CB2FF; --sun-soft:#0f1d2e;
}
.btn-primary{ background:var(--sky-500); color:#fff; box-shadow:0 6px 16px rgba(61,139,240,.32); }
.btn-primary:active{ background:var(--sky-600); }
.fab{ background:var(--sky-500); color:#fff; }
.cal-cell.today{ background:var(--sky-500); color:#fff; }
.cal-cell.today .pip{ background:#fff; }
.tab.is-active::before{ background:rgba(61,139,240,.16); }
.today::after{ background:rgba(61,139,240,.10); }
.today-sun{ background:rgba(61,139,240,.16); color:var(--sun); }
.sw.on{ background:var(--sky-500); }
.banner{ background:rgba(61,139,240,.10); border-color:rgba(61,139,240,.30); }
.banner svg{ color:var(--sun); }
.banner-txt{ color:#C9DEF7; }
.banner-txt b{ color:var(--sun); }
.today-mine{ background:linear-gradient(135deg, rgba(55,201,142,.18), rgba(61,139,240,.06)); }

/* ============================================================
   ANIMAÇÃO DO LOGO NO LOGIN (mídia)
   entra com "pop" e fica flutuando com brilho azul
   ============================================================ */
.login-logo{
  animation: logoIn .85s cubic-bezier(.2,.9,.3,1) both,
             logoFloat 4.5s ease-in-out .85s infinite;
  will-change: transform, filter;
}
@keyframes logoIn{
  0%{   opacity:0; transform:translateY(18px) scale(.78) rotate(-5deg); filter:drop-shadow(0 0 0 rgba(61,139,240,0)); }
  55%{  opacity:1; transform:translateY(-4px) scale(1.06) rotate(2deg); }
  100%{ opacity:1; transform:translateY(0) scale(1) rotate(0); }
}
@keyframes logoFloat{
  0%,100%{ transform:translateY(0); filter:drop-shadow(0 8px 22px rgba(0,0,0,.5)); }
  50%{    transform:translateY(-8px); filter:drop-shadow(0 18px 34px rgba(61,139,240,.45)); }
}
/* leve respiro de brilho atrás do logo via o card (halo) */
.login-card{ position:relative; }
.login-card::before{
  content:""; position:absolute; top:18px; left:50%; transform:translateX(-50%);
  width:160px; height:160px; border-radius:50%; z-index:0;
  background:radial-gradient(circle, rgba(61,139,240,.22), transparent 70%);
  animation:haloPulse 4.5s ease-in-out .85s infinite; pointer-events:none;
}
.login-card > *{ position:relative; z-index:1; }
@keyframes haloPulse{
  0%,100%{ opacity:.35; transform:translateX(-50%) scale(.9); }
  50%{    opacity:.7;  transform:translateX(-50%) scale(1.08); }
}
@media (prefers-reduced-motion:reduce){
  .login-logo{ animation:none; } .login-card::before{ animation:none; opacity:.4; }
}

/* ---------- Foto do evento ---------- */
.event-photo-prev{ width:100%; height:140px; border-radius:14px; background:#141419;
  border:1px solid var(--line); background-size:cover; background-position:center;
  display:flex; align-items:center; justify-content:center; }
.event-thumb{ width:44px; height:44px; border-radius:10px; background-size:cover;
  background-position:center; flex-shrink:0; border:1px solid var(--line); }
.occ-banner{ width:100%; height:130px; border-radius:14px; background-size:cover;
  background-position:center; margin-bottom:14px; border:1px solid var(--line); }

/* ============================================================
   SPLASH DE ENTRADA (após acertar a senha)
   ============================================================ */
.enter-splash{ position:fixed; inset:0; z-index:9999; display:none;
  align-items:center; justify-content:center;
  background:radial-gradient(820px 480px at 50% 32%, #1d1d24, #0d0d0f 72%);
  opacity:0; transition:opacity .45s ease; }
.enter-splash.show{ opacity:1; }
.enter-splash.hide{ opacity:0; }
.enter-splash-inner{ display:flex; flex-direction:column; align-items:center; gap:20px; }
.enter-splash-logo{ width:128px; height:auto;
  filter:drop-shadow(0 10px 28px rgba(61,139,240,.45));
  animation:splashLogo 1.6s ease-in-out infinite; }
@keyframes splashLogo{ 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-7px) scale(1.05); } }
.enter-spinner{ width:34px; height:34px; border-radius:50%;
  border:3px solid rgba(108,178,255,.22); border-top-color:#6CB2FF;
  animation:spin .8s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.enter-splash-txt{ font-family:var(--font-display); font-weight:600;
  color:#6CB2FF; letter-spacing:.02em; font-size:15px; }
@media (prefers-reduced-motion:reduce){ .enter-splash-logo,.enter-spinner{ animation:none; } }

/* ---------- Seletor de cor do evento ---------- */
.color-row{ display:flex; gap:10px; flex-wrap:wrap; }
.color-dot{ width:30px; height:30px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; box-shadow:0 2px 6px rgba(0,0,0,.4); transition:transform .12s; }
.color-dot.on{ border-color:#fff; transform:scale(1.14);
  box-shadow:0 0 0 3px rgba(255,255,255,.16), 0 2px 8px rgba(0,0,0,.5); }

/* ---------- X vermelho (culto sem escala) ---------- */
.x-mark{ display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px; border-radius:50%; background:rgba(255,77,94,.14); color:#FF4D5E; }
.x-mark svg{ width:14px; height:14px; }

/* ---------- Dias já passados (esmaecidos) ---------- */
.cal-cell.past{ opacity:.34; }
.cal-cell.past.sel{ opacity:.6; }

/* ============================================================
   SPLASH: só a logo girando (volante, sentido horário)
   ============================================================ */
.enter-spinner, .enter-splash-txt{ display:none !important; }
.enter-splash-logo{
  width:140px; height:auto;
  filter:drop-shadow(0 12px 30px rgba(61,139,240,.45));
  animation: spinLogo 1.15s linear infinite !important;
}
@keyframes spinLogo{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
@media (prefers-reduced-motion:reduce){ .enter-splash-logo{ animation:none !important; } }

  </style>
</head>

   Enquanto estiver em branco, o app roda em "modo de teste" local.

const SUPABASE_URL = "https://nuwlfvrvacgemlcgskey.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51d2xmdnJ2YWNnZW1sY2dza2V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjE5MzQsImV4cCI6MjA5NzEzNzkzNH0.NFhSnyCLU4pkYhzpH-LLssNSSPk6QociOeGNijga-GU";
const USE_SUPABASE = !!(SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase);
const sb = USE_SUPABASE ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* Camada de autenticação. Troque o "modo local" pelas chamadas reais quando
   conectar o Supabase — os pontos estão marcados com  // === SUPABASE === */
const Auth = {
  user:null, role:null,

  async init(){
    if(USE_SUPABASE){
      // === SUPABASE: recupera a sessão salva ===
      const { data } = await sb.auth.getSession();
      if(data && data.session){ await this.loadProfile(data.session.user); }
      sb.auth.onAuthStateChange((_evt, session)=>{
        if(!session){ this.user=null; this.role=null; showLogin(); }
      });
    } else {
      // modo de teste local (sem Supabase configurado)
      const saved = localStorage.getItem("escala-midia-localauth");
      if(saved){ this.user = { email: saved }; this.role = "leader"; }
    }
  },

  async loadProfile(user){
    // === SUPABASE: papel, vínculo, áreas que lidera e troca de senha ===
    let role="volunteer", memberId="", roomIds=[], mustChangeRaw=false;
    try{
      const { data } = await sb.from("profiles").select("role, member_id, room_ids, must_change_password").eq("id", user.id).single();
      if(data){
        if(data.role) role=data.role;
        if(data.member_id) memberId=data.member_id;
        if(Array.isArray(data.room_ids)) roomIds=data.room_ids;
        mustChangeRaw = data.must_change_password===true;
      }
    }catch(e){}
    // marca confiável: se o usuário já trocou a senha (gravado nos metadados dele), não pede de novo
    const pwSet = !!(user && user.user_metadata && user.user_metadata.pw_set===true);
    this.user=user; this.role=role; this.memberId=memberId; this.roomIds=roomIds;
    this.mustChange = mustChangeRaw && !pwSet;
    return role;
  },

  async signIn(email, password){
    if(USE_SUPABASE){
      // === SUPABASE: login com e-mail/senha ===
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if(error) throw new Error(traduzErroAuth(error.message));
      await this.loadProfile(data.user);
      return true;   // líderes/admin editam; voluntários entram em modo somente-leitura
    } else {
      // modo de teste: aceita qualquer e-mail como líder, só para você testar
      if(!email){ throw new Error("Digite um e-mail."); }
      this.user = { email }; this.role = "leader";
      localStorage.setItem("escala-midia-localauth", email);
      return true;
    }
  },

  async signOut(){
    if(USE_SUPABASE){ try{ await sb.auth.signOut(); }catch(e){} }
    else localStorage.removeItem("escala-midia-localauth");
    this.user=null; this.role=null;
  },

  isLeader(){ return this.role==="leader" || this.role==="admin"; },
  email(){ return this.user ? (this.user.email||"") : ""; }
};

function traduzErroAuth(msg){
  if(/invalid login credentials/i.test(msg)) return "E-mail ou senha incorretos.";
  if(/email not confirmed/i.test(msg)) return "Confirme seu e-mail antes de entrar.";
  return msg;
}

/* ===========================================================
   CAMADA DE DADOS — Supabase (nuvem) ou localStorage (teste)
   Quando o Supabase está configurado, tudo é lido/gravado nas
   tabelas. Sem ele, cai no modo local (localStorage).
   =========================================================== */
const CLOUD = USE_SUPABASE;

async function sbErr(promise, ctx){
  const { data, error } = await promise;
  if(error) throw new Error((ctx?ctx+": ":"")+(error.message||"erro"));
  return data;
}

const Data = {
  async loadAll(){
    const [rooms, services, events, members, mrooms, assigns] = await Promise.all([
      sb.from("rooms").select("*"),
      sb.from("services").select("*"),
      sb.from("events").select("*"),
      sb.from("members").select("*"),
      sb.from("member_rooms").select("*"),
      sb.from("assignments").select("*"),
    ]);
    for(const r of [rooms,services,events,members,mrooms,assigns]) if(r.error) throw new Error(r.error.message);

    DB.rooms = (rooms.data||[]).map(r=>({id:r.id,name:r.name,age:r.age||"",emoji:r.emoji||"⭐",bg:r.bg||"#EAF4FC",fg:r.fg||"#2E86D6",need:3,sort:r.sort||0}))
      .sort((a,b)=>(a.sort||0)-(b.sort||0));
    DB.services = (services.data||[]).map(s=>({id:s.id,name:s.name,weekday:s.weekday,time:s.time||"",color:s.color||"#4DA3E8"}));
    DB.events = (events.data||[]).map(e=>({id:e.id,date:e.date,title:e.title,time:e.time||"",note:e.note||"",photo:e.photo||"",color:e.color||"#FF8A1E"}));
    const byMember={};
    (mrooms.data||[]).forEach(mr=>{ (byMember[mr.member_id]=byMember[mr.member_id]||[]).push(mr.room_id); });
    DB.members = (members.data||[]).map(m=>({id:m.id,name:m.full_name,phone:m.phone||"",role:m.fn||"",roomIds:byMember[m.id]||[],active:m.active!==false,notes:m.notes||"",photo:m.photo||"",training:m.training===true}));
    const sched={};
    (assigns.data||[]).forEach(a=>{
      const key = a.source_type==="event" ? `e:${a.source_id}` : `s:${a.source_id}:${a.occ_date}`;
      sched[key]=sched[key]||{};
      sched[key][a.room_id]=sched[key][a.room_id]||{lider:null,monitores:[]};
      if(a.role_in_room==="leader") sched[key][a.room_id].lider=a.member_id;
      else sched[key][a.room_id].monitores.push(a.member_id);
    });
    DB.schedules = sched;
    save();
    if(!DB.rooms.length && isAdmin()) await this.seedDefaults();
  },

  async seedDefaults(){
    const s = seed();
    await sbErr(sb.from("rooms").insert(s.rooms.map((r,i)=>({id:r.id,name:r.name,age:r.age,emoji:r.emoji,bg:r.bg,fg:r.fg,need:3,sort:i}))), "popular salas");
    await sbErr(sb.from("services").insert(s.services.map(x=>({id:x.id,name:x.name,weekday:x.weekday,time:x.time,color:x.color}))), "popular cultos");
    DB.rooms=s.rooms; DB.services=s.services; DB.events=[]; DB.members=[]; DB.schedules={}; save();
  },

  async saveMember(m, isNew){
    if(CLOUD){
      const row={ id:m.id, full_name:m.name, phone:m.phone||null, fn:m.role||null, active:m.active, notes:m.notes||null, photo:m.photo||null, training:m.training||false };
      if(isNew) await sbErr(sb.from("members").insert(row), "criar pessoa");
      else      await sbErr(sb.from("members").update(row).eq("id",m.id), "salvar pessoa");
      await sbErr(sb.from("member_rooms").delete().eq("member_id",m.id), "atualizar salas");
      if(m.roomIds.length) await sbErr(sb.from("member_rooms").insert(m.roomIds.map(rid=>({member_id:m.id,room_id:rid}))), "atualizar salas");
    }
    if(isNew) DB.members.push(m); else Object.assign(getMember(m.id), m);
    save();
  },
  async deleteMember(id){
    if(CLOUD) await sbErr(sb.from("members").delete().eq("id",id), "excluir pessoa");
    DB.members = DB.members.filter(x=>x.id!==id);
    Object.values(DB.schedules).forEach(s=>Object.keys(s).forEach(rid=>{ const v=s[rid];
      if(v&&typeof v==="object"){ if(v.lider===id) v.lider=null; v.monitores=(v.monitores||[]).filter(x=>x!==id);} }));
    if(DB.settings.meId===id) DB.settings.meId="";
    save();
  },

  async saveRoom(r, isNew){
    if(CLOUD){ const row={id:r.id,name:r.name,age:r.age||null,emoji:r.emoji,bg:r.bg,fg:r.fg,need:3};
      if(isNew) await sbErr(sb.from("rooms").insert(row),"criar sala"); else await sbErr(sb.from("rooms").update(row).eq("id",r.id),"salvar sala"); }
    if(isNew) DB.rooms.push(r); else Object.assign(getRoom(r.id), r); save();
  },
  async deleteRoom(id){
    if(CLOUD) await sbErr(sb.from("rooms").delete().eq("id",id),"excluir sala");
    DB.rooms=DB.rooms.filter(x=>x.id!==id);
    DB.members.forEach(m=>m.roomIds=m.roomIds.filter(x=>x!==id));
    Object.values(DB.schedules).forEach(s=>delete s[id]); save();
  },

  async saveService(s, isNew){
    if(CLOUD){ const row={id:s.id,name:s.name,weekday:s.weekday,time:s.time,color:s.color};
      if(isNew) await sbErr(sb.from("services").insert(row),"criar culto"); else await sbErr(sb.from("services").update(row).eq("id",s.id),"salvar culto"); }
    if(isNew) DB.services.push(s); else Object.assign(getService(s.id), s); save();
  },
  async deleteService(id){
    if(CLOUD) await sbErr(sb.from("services").delete().eq("id",id),"excluir culto");
    DB.services=DB.services.filter(x=>x.id!==id); save();
  },

  async saveEvent(e, isNew){
    if(CLOUD){ const row={id:e.id,date:e.date,title:e.title,time:e.time||null,note:e.note||null,photo:e.photo||null,color:e.color||null};
      if(isNew) await sbErr(sb.from("events").insert(row),"criar evento"); else await sbErr(sb.from("events").update(row).eq("id",e.id),"salvar evento"); }
    if(isNew) DB.events.push(e); else Object.assign(DB.events.find(x=>x.id===e.id), e); save();
  },
  async deleteEvent(id){
    if(CLOUD) await sbErr(sb.from("events").delete().eq("id",id),"excluir evento");
    DB.events=DB.events.filter(x=>x.id!==id); delete DB.schedules[`e:${id}`]; save();
  },

  async saveSchedule(key, occ, sched, roomScope){
    // roomScope: lista de áreas a gravar (líder de área). Sem escopo = tudo (admin).
    if(roomScope){
      const cur = DB.schedules[key] || {};
      roomScope.forEach(rid=>{ const s=sched[rid];
        if(s && (s.lider || (s.monitores||[]).length)) cur[rid]=s; else delete cur[rid]; });
      DB.schedules[key]=cur;
    } else {
      DB.schedules[key]=sched;
    }
    save();
    if(!CLOUD) return;
    const st  = occ.type==="evento" ? "event" : "service";
    const sid = key.startsWith("e:") ? key.slice(2) : key.split(":")[1];
    const date= occ.date;
    const buildRows = ids => {
      const rows=[];
      ids.forEach(rid=>{ const slot=sched[rid]; if(!slot) return;
        if(slot.lider) rows.push({occ_date:date,source_type:st,source_id:sid,room_id:rid,member_id:slot.lider,role_in_room:"leader"});
        (slot.monitores||[]).forEach(mid=>rows.push({occ_date:date,source_type:st,source_id:sid,room_id:rid,member_id:mid,role_in_room:"monitor"}));
      });
      return rows;
    };
    if(roomScope){
      // apaga e regrava SÓ as áreas do escopo (preserva as demais)
      if(roomScope.length){
        await sbErr(sb.from("assignments").delete().eq("source_type",st).eq("source_id",sid).eq("occ_date",date).in("room_id", roomScope), "atualizar escala");
      }
      const rows=buildRows(roomScope);
      if(rows.length) await sbErr(sb.from("assignments").insert(rows), "salvar escala");
    } else {
      await sbErr(sb.from("assignments").delete().eq("source_type",st).eq("source_id",sid).eq("occ_date",date), "atualizar escala");
      const rows=buildRows(Object.keys(sched));
      if(rows.length) await sbErr(sb.from("assignments").insert(rows), "salvar escala");
    }
  }
};

/* ---------------- Persistência ---------------- */
const STORE_KEY = "escala-midia-v1";
let DB = load();

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return migrate(JSON.parse(raw));
  }catch(e){}
  const fresh = seed();
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(fresh)); }catch(e){}
  return fresh;
}

/* Normaliza a escala para o formato { lider, monitores[] } (máx 1+2 por sala) */
function migrate(db){
  if(db && db.schedules){
    for(const k in db.schedules){
      const rooms = db.schedules[k];
      for(const rid in rooms){
        const v = rooms[rid];
        if(Array.isArray(v)){
          rooms[rid] = { lider: v[0]||null, monitores: v.slice(1,3) };
        } else if(v && typeof v==="object"){
          rooms[rid] = { lider: v.lider||null, monitores: (v.monitores||[]).slice(0,2) };
        }
      }
    }
  }
  if(db && db.settings && !db.settings.role) db.settings.role = "lider";
  return db;
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }catch(e){
    toast("Não consegui salvar. Espaço do navegador cheio?", "warn");
  }
}
function uid(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  // fallback simples (também no formato uuid)
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,c=>{
    const r=Math.random()*16|0, v=c==="x"?r:(r&0x3|0x8); return v.toString(16); });
}

/* ---------------- Helpers de data ---------------- */
const WD = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
const WD_SHORT = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTHS_SHORT = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];

function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseYmd(s){ const [y,mo,da]=s.split("-").map(Number); return new Date(y,mo-1,da); }
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function fmtLong(s){ const d=parseYmd(s); return `${WD[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]}`; }
function fmtShort(s){ const d=parseYmd(s); return `${WD_SHORT[d.getDay()]}, ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`; }

/* ---------------- Helpers diversos ---------------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function initials(name){ const p=name.trim().split(/\s+/); return ((p[0]||"")[0]||"").toUpperCase()+((p[1]||"")[0]||"").toUpperCase(); }
const AVA_COLORS = ["#4DA3E8","#7A5BCC","#239B6E","#E07B2E","#D0497C","#2E86D6","#C9941A","#3FBF8F"];
function avaColor(id){ let h=0; for(const c of id) h=(h*31+c.charCodeAt(0))>>>0; return AVA_COLORS[h%AVA_COLORS.length]; }
function ava(name,id,extraStyle=""){
  const m = id ? getMember(id) : null;
  if(m && m.photo){
    return `<div class="ava ava-photo" style="background-image:url('${m.photo}');${extraStyle}" aria-label="${esc(name)}"></div>`;
  }
  return `<div class="ava" style="background:${avaColor(id)};${extraStyle}">${esc(initials(name))}</div>`;
}
function getMember(id){ return DB.members.find(m=>m.id===id); }
function getRoom(id){ return DB.rooms.find(r=>r.id===id); }
function getService(id){ return DB.services.find(s=>s.id===id); }
function cleanPhone(p){ let d=(p||"").replace(/\D/g,""); if(d && d.length<=11) d="55"+d; return d; }

/* Ocorrências de culto/evento numa data (string ymd) */
function occsOnDate(dateStr){
  const d=parseYmd(dateStr), wd=d.getDay(), list=[];
  DB.services.forEach(s=>{ if(s.weekday===wd) list.push({key:`s:${s.id}:${dateStr}`,date:dateStr,title:s.name,time:s.time,color:s.color,type:"culto",refId:s.id}); });
  DB.events.filter(e=>e.date===dateStr).forEach(e=>{ list.push({key:`e:${e.id}`,date:dateStr,title:e.title,time:e.time||"",color:e.color||"#FF8A1E",type:"evento",refId:e.id,note:e.note,photo:e.photo||""}); });
  return list.sort((a,b)=>(a.time||"99").localeCompare(b.time||"99"));
}
/* Próximas ocorrências a partir de hoje (n dias à frente) */
function upcomingOccs(days=21){
  const out=[]; const base=today();
  for(let i=0;i<days;i++){ const d=new Date(base); d.setDate(base.getDate()+i); out.push(...occsOnDate(ymd(d))); }
  return out;
}
function schedFor(key){ return DB.schedules[key] || {}; }

/* Slot de uma sala: 1 líder + até 2 monitores (máx 3) */
function roomSlot(key, roomId){
  const v = schedFor(key)[roomId];
  if(!v) return { lider:null, monitores:[] };
  if(Array.isArray(v)) return { lider:v[0]||null, monitores:v.slice(1,3) };
  return { lider:v.lider||null, monitores:(v.monitores||[]).slice(0,2) };
}
function roomPeopleIds(key, roomId){ const s=roomSlot(key,roomId); return [s.lider, ...s.monitores].filter(Boolean); }
function assignedCount(key){ const s=schedFor(key); return Object.keys(s).reduce((a,rid)=>a+roomPeopleIds(key,rid).length,0); }
function occHasMember(key, mid){ const s=schedFor(key); return Object.keys(s).some(rid=>roomPeopleIds(key,rid).includes(mid)); }
function memberRoleInRoom(key, roomId, mid){
  const s=roomSlot(key,roomId);
  if(s.lider===mid) return "Responsável";
  if(s.monitores.includes(mid)) return "Auxiliar";
  return null;
}

/* Papel vem do Supabase (tabela profiles). O login já só deixa líder entrar,
   então quem está no app é líder. Em modo de teste local, também é líder. */
function isAdmin(){ if(!USE_SUPABASE) return true; return Auth.role==="admin"; }
function isLeader(){ if(!USE_SUPABASE) return true; return Auth.role==="leader" || Auth.role==="admin"; }
function leaderRoomIds(){ return Array.isArray(Auth.roomIds)?Auth.roomIds:[]; }
function canEditRoom(rid){ return isAdmin() || (Auth.role==="leader" && leaderRoomIds().includes(rid)); }
function canEditAnyRoom(){ return isAdmin() || (Auth.role==="leader" && leaderRoomIds().length>0); }
function canCreateEvent(){ return isLeader(); }

/* Todas as ocorrências dentro de um mês do calendário */
function occsInMonth(y,m){
  const days=new Date(y,m+1,0).getDate(); const out=[];
  for(let d=1;d<=days;d++){ out.push(...occsOnDate(`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`)); }
  return out;
}
/* Ocorrências em que um membro está escalado dentro de um mês */
function myOccsInMonth(mid,y,m){
  return occsInMonth(y,m).filter(o=>occHasMember(o.key, mid));
}

/* ---------------- Roteador ---------------- */
const VIEWS = {
  home:{title:"Início", render:renderHome},
  escala:{title:"Escala", render:renderEscala},
  calendario:{title:"Agenda", render:renderCalendario},
  membros:{title:"Equipe", render:renderMembros},
  config:{title:"Mais", render:renderConfig},
};
let currentView = "home";

function go(view){
  currentView = view;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("is-active", t.dataset.view===view));
  document.getElementById("topTitle").textContent = VIEWS[view].title;
  const content = document.getElementById("content");
  document.getElementById("topActions").innerHTML = "";
  content.innerHTML = "";
  VIEWS[view].render(content);
  content.scrollTop = 0; window.scrollTo(0,0);
}

document.getElementById("tabbar").addEventListener("click", e=>{
  const b=e.target.closest(".tab"); if(b) go(b.dataset.view);
});

/* =====================================================================
   VIEW: INÍCIO
   ===================================================================== */
function renderHome(c){
  const t = today();
  const todayStr = ymd(t);
  const occs = occsOnDate(todayStr);
  const me = DB.settings.meId ? getMember(DB.settings.meId) : null;

  let html = "";

  // Banner de notificação
  if(!DB.settings.notify && "Notification" in window){
    html += `<div class="banner">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      <div class="banner-txt"><b>Lembretes de escala</b><br>Ative para ser avisado nos dias em que estiver escalado.</div>
      <button class="btn btn-ghost" data-action="enable-notif" style="padding:9px 12px;font-size:13px">Ativar</button>
    </div>`;
  }

  // "Você" escalado hoje
  if(me){
    const minhasSalas = occs.flatMap(o=>{ const s=schedFor(o.key);
      return Object.keys(s).filter(rid=>roomPeopleIds(o.key,rid).includes(me.id))
        .map(rid=>({occ:o,room:getRoom(rid),role:memberRoleInRoom(o.key,rid,me.id)})); });
    if(minhasSalas.length){
      html += `<div class="today today-mine" style="margin-bottom:14px">
        <div class="today-date"><div class="today-sun today-mine-ico">
          <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>
          <div><div class="today-day">🎬 É o seu dia, ${esc(me.name.split(" ")[0])}!</div>
          <div class="today-sub today-mine-sub">Você está escalado hoje</div></div></div>
        ${minhasSalas.map(x=>`<div class="today-event today-mine-ev">${esc(x.occ.title)} • ${esc(x.room?x.room.name:"—")}${x.role?" • "+x.role:""} ${x.occ.time?"• "+x.occ.time:""}</div>`).join("")}
      </div>`;
    }
  }

  // Card de hoje
  html += `<div class="today">
    <div class="today-date">
      <div class="today-sun"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.2 4.2l1.5 1.5M18.3 18.3l1.5 1.5M2 12h2M20 12h2M4.2 19.8l1.5-1.5M18.3 5.7l1.5-1.5"/></svg></div>
      <div><div class="today-day">${WD[t.getDay()]}, ${t.getDate()} de ${MONTHS[t.getMonth()]}</div>
      <div class="today-sub">${DB.settings.dept}</div></div>
    </div>`;
  if(occs.length){
    occs.forEach(o=>{
      const n = assignedCount(o.key);
      html += `<div class="today-event list-tap" data-action="open-occ" data-key="${o.key}">${esc(o.title)} ${o.time?"• "+o.time:""}
        <span class="today-sub" style="display:block;font-weight:500">${n? n+" pessoa(s) escalada(s)" : "Sem escala definida — toque para montar"}</span></div>`;
    });
  } else {
    html += `<div class="today-empty">Sem culto programado para hoje. Aproveite o descanso! 💙</div>`;
  }
  html += `</div>`;

  // Stats
  const ativos = DB.members.filter(m=>m.active).length;
  html += `<div class="stats">
    <div class="stat"><b>${ativos}</b><span>na equipe</span></div>
    <div class="stat"><b>${DB.rooms.length}</b><span>salas</span></div>
    <div class="stat"><b>${upcomingOccs(7).length}</b><span>cultos/7 dias</span></div>
  </div>`;

  // Próximos cultos
  const up = upcomingOccs(14).slice(0,4);
  html += `<div class="section-label">Próximos cultos <span class="link" data-action="goto" data-view="escala">Ver escala</span></div>`;
  if(up.length){
    up.forEach(o=>{
      const n = assignedCount(o.key);
      const status = n>0
        ? `<span class="dot"></span>${n}`
        : `<span class="x-mark" title="Sem escala"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></span>`;
      html += `<div class="room list-tap" data-action="open-occ" data-key="${o.key}">
        <div class="room-ico" style="background:${o.color}22;color:${o.color}">${o.type==="evento"?"🎉":"⛪"}</div>
        <div class="room-info"><div class="room-name">${esc(o.title)}</div>
          <div class="room-age">${fmtShort(o.date)} ${o.time?"• "+o.time:""}</div></div>
        <div class="room-count">${status}</div>
      </div>`;
    });
  } else {
    html += `<p class="muted-txt" style="text-align:center;padding:14px">Nenhum culto nos próximos dias.</p>`;
  }

  // Salas resumo
  html += `<div class="section-label">Áreas <span class="link" data-action="goto" data-view="config">Editar</span></div>`;
  DB.rooms.forEach(r=>{
    const qtd = DB.members.filter(m=>m.active && m.roomIds.includes(r.id)).length;
    html += `<div class="room">
      <div class="room-ico" style="background:${r.bg};color:${r.fg}">${r.emoji}</div>
      <div class="room-info"><div class="room-name">${esc(r.name)}</div><div class="room-age">${esc(r.age)}</div></div>
      <div class="room-count"><span class="chip muted">${qtd} aptos</span></div>
    </div>`;
  });

  c.innerHTML = html;
}

/* =====================================================================
   VIEW: ESCALA (visão de mês)
   ===================================================================== */
let escYear, escMonth;
function renderEscala(c){
  const t=today();
  if(escYear==null){ escYear=t.getFullYear(); escMonth=t.getMonth(); }
  const leader = canEditAnyRoom();
  const me = DB.settings.meId ? getMember(DB.settings.meId) : null;

  if(leader){
    document.getElementById("topActions").innerHTML =
      `<button class="icon-btn" data-action="new-schedule" aria-label="Montar escala">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>`;
  }

  // navegador de mês
  let html = `<div class="cal-head" style="margin-bottom:12px">
      <div class="cal-month">${MONTHS[escMonth]} ${escYear}</div>
      <div class="cal-nav">
        <button data-action="esc-prev"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
        <button data-action="esc-today" style="width:auto;padding:0 12px;font-family:var(--font-display);font-weight:700;font-size:13px">Hoje</button>
        <button data-action="esc-next"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
    </div>`;

  const occs = occsInMonth(escYear, escMonth);

  if(!occs.length){
    html += emptyState("📅","Nenhum culto neste mês",
      leader?"Cadastre cultos da semana e eventos na aba Agenda. Eles aparecem aqui automaticamente.":"O líder ainda não cadastrou cultos para este mês.",
      leader?`<button class="btn btn-primary" data-action="goto" data-view="calendario">Ir para Agenda</button>`:"");
    c.innerHTML = html; return;
  }

  // resumo do mês
  const full = occs.filter(o=>assignedCount(o.key)>0).length;
  const meCount = me ? myOccsInMonth(me.id, escYear, escMonth).length : 0;
  html += `<div class="stats" style="margin:0 0 16px">
    <div class="stat"><b>${occs.length}</b><span>cultos no mês</span></div>
    <div class="stat"><b>${full}</b><span>com escala</span></div>
    <div class="stat"><b>${me?meCount:"—"}</b><span>${me?"meus dias":"defina quem é você"}</span></div>
  </div>`;

  if(leader){
    html += `<button class="btn btn-primary btn-block" data-action="new-schedule" style="margin-bottom:14px">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Montar nova escala</button>`;
  }

  // agrupa por semana do mês
  const byWeek = {};
  occs.forEach(o=>{ const d=parseYmd(o.date);
    const wk=Math.ceil((d.getDate()+new Date(escYear,escMonth,1).getDay())/7);
    (byWeek[wk]=byWeek[wk]||[]).push(o); });

  Object.keys(byWeek).sort((a,b)=>a-b).forEach(wk=>{
    html += `<div class="section-label">Semana ${wk}</div>`;
    // agrupa por data dentro da semana
    const byDate={}; byWeek[wk].forEach(o=>(byDate[o.date]=byDate[o.date]||[]).push(o));
    Object.keys(byDate).forEach(date=>{
      const isToday = date===ymd(t);
      html += `<div class="sched-day"><div class="sched-head">
        <div class="sched-date">${fmtLong(date)} ${isToday?'<span class="chip" style="margin-left:6px">hoje</span>':''}</div></div>`;
      byDate[date].forEach(o=>{
        const sched=schedFor(o.key); const n=assignedCount(o.key);
        const mineHere = me && occHasMember(o.key, me.id);
        html += `<div class="sched-room" style="border-left:4px solid ${o.color}${mineHere?";background:var(--good-soft)":""}">
          <div class="room-ico" style="background:${o.color}22;color:${o.color}">${o.type==="evento"?"🎉":"⛪"}</div>
          <div class="sched-room-names"><div class="sched-room-title">${esc(o.title)} ${o.time?"<span class='sched-when'>• "+o.time+"</span>":""} ${mineHere?"<span class='chip good'>você</span>":""}</div>
            ${n? n+" escalado(s)" : (leader?"Sem escala":"Aguardando escala")}</div>
          <button class="btn btn-ghost" data-action="open-occ" data-key="${o.key}" style="padding:8px 14px;font-size:13px">${leader?(n?"Editar":"Montar"):"Ver"}</button>
        </div>`;
        Object.keys(sched).forEach(rid=>{
          const ids=roomPeopleIds(o.key,rid);
          if(!ids.length) return;
          const r=getRoom(rid); if(!r) return;
          const slot=roomSlot(o.key,rid);
          const ordered=[slot.lider,...slot.monitores].filter(Boolean).map(id=>getMember(id)).filter(Boolean);
          html += `<div style="display:flex;align-items:center;gap:10px;padding:6px 13px 6px 50px">
            <span class="chip" style="background:${r.bg};color:${r.fg}">${r.emoji} ${esc(r.name)}</span>
            <div class="ava-row">${ordered.map((p,i)=>ava(p.name,p.id,i===0&&slot.lider?"box-shadow:0 0 0 2px var(--sun)":"")).join("")}</div>
          </div>`;
        });
      });
      html += `</div>`;
    });
  });

  c.innerHTML = html;
}

/* =====================================================================
   VIEW: CALENDÁRIO / AGENDA
   ===================================================================== */
let calYear, calMonth, calSelected=null;
function renderCalendario(c){
  if(isLeader()) document.getElementById("topActions").innerHTML =
    `<button class="icon-btn" data-action="new-event" aria-label="Novo evento">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>`;

  const t=today();
  if(calYear==null){ calYear=t.getFullYear(); calMonth=t.getMonth(); }
  if(!calSelected) calSelected = ymd(t);

  const first = new Date(calYear, calMonth, 1);
  const startWd = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  let cells = "";
  WD_SHORT.forEach(w=>cells+=`<div class="cal-wd">${w[0]}</div>`);
  // dias do mês anterior (preenchimento)
  for(let i=startWd-1;i>=0;i--) cells+=`<div class="cal-cell muted">${prevDays-i}</div>`;
  for(let day=1;day<=daysInMonth;day++){
    const ds = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const occ = occsOnDate(ds);
    const isToday = ds===ymd(t);
    const isSel = ds===calSelected;
    const isPast = ds < ymd(t);
    let cls="cal-cell"; if(isToday) cls+=" today"; if(occ.length && !isToday) cls+=" has"; if(isSel) cls+=" sel"; if(isPast && !isToday) cls+=" past";
    const evOccs = occ.filter(o=>o.type==="evento");
    let pips="";
    if(occ.some(o=>o.type==="culto")) pips+=`<span class="pip"></span>`;
    let cellStyle="", dayHTML=`${day}`;
    if(evOccs.length){
      const c=evOccs[0].color;
      if(isToday){
        cellStyle=`box-shadow:0 0 0 2px ${c}, 0 0 12px ${c}aa;`;
      }else{
        cellStyle=`background:${c}26;box-shadow:inset 0 0 0 2px ${c}, 0 0 12px ${c}66;`;
        dayHTML=`<span style="color:${c};font-weight:800">${day}</span>`;
      }
    }
    cells+=`<div class="${cls}" style="${cellStyle}" data-action="sel-day" data-date="${ds}">${dayHTML}${pips?`<span style="position:absolute;bottom:5px;display:flex;gap:2px">${pips}</span>`:""}</div>`;
  }

  let html = `<div class="cal">
    <div class="cal-head">
      <div class="cal-month">${MONTHS[calMonth]} ${calYear}</div>
      <div class="cal-nav">
        <button data-action="cal-prev"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
        <button data-action="cal-today" style="width:auto;padding:0 12px;font-family:var(--font-display);font-weight:700;font-size:13px">Hoje</button>
        <button data-action="cal-next"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
    </div>
    <div class="cal-grid">${cells}</div>
  </div>`;

  // legenda
  html += `<div style="display:flex;gap:16px;justify-content:center;margin:12px 0 4px;font-size:12px;color:var(--ink-soft)">
    <span style="display:flex;align-items:center;gap:6px"><span class="pip" style="position:static;width:6px;height:6px;background:var(--sky-500)"></span> Culto</span>
    <span style="display:flex;align-items:center;gap:6px"><span style="width:15px;height:15px;border-radius:5px;background:#FF8A1E26;box-shadow:inset 0 0 0 2px #FF8A1E;display:inline-block"></span> Evento</span>
  </div>`;

  // detalhe do dia selecionado
  const occs = occsOnDate(calSelected);
  html += `<div class="day-detail"><div class="section-label">${fmtLong(calSelected)}</div>`;
  if(occs.length){
    occs.forEach(o=>{
      const n=assignedCount(o.key);
      html += `<div class="event-line list-tap" data-action="open-occ" data-key="${o.key}">
        ${o.photo?`<div class="event-thumb" style="background-image:url('${o.photo}')"></div>`:`<div class="event-tag" style="background:${o.color}"></div>`}
        <div class="event-info"><div class="event-title">${esc(o.title)}</div>
          <div class="event-time">${o.type==="evento"?"Evento":"Culto"} ${o.time?"• "+o.time:""} • ${n} escalado(s)</div>
          ${o.note?`<div class="event-time" style="margin-top:2px">${esc(o.note)}</div>`:""}</div>
        ${o.type==="evento"&&isLeader()?`<button class="icon-btn sm" data-action="edit-event" data-id="${o.refId}"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>`:""}
      </div>`;
    });
  } else {
    html += `<p class="muted-txt" style="text-align:center;padding:14px">Nada marcado neste dia.</p>`;
  }
  html += `</div>`;
  if(isLeader()) html += `<button class="btn btn-ghost btn-block" data-action="new-event-on" data-date="${calSelected}" style="margin-top:6px">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Adicionar evento neste dia</button>`;

  c.innerHTML = html;
}

/* =====================================================================
   VIEW: MEMBROS / EQUIPE
   ===================================================================== */
let memberFilter = "all";
function renderMembros(c){
  if(isAdmin()) document.getElementById("topActions").innerHTML =
    `<button class="icon-btn" data-action="new-member" aria-label="Novo membro">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>`;

  let html = `<div class="pick" style="margin-bottom:14px">
    <span class="pick-item ${memberFilter==="all"?"on":""}" data-action="mfilter" data-f="all" style="${memberFilter==="all"?"background:var(--sky-500)":""}">Todos</span>

  c.innerHTML = html;

/* =====================================================================
   AÇÕES (event delegation)
   ===================================================================== */
document.addEventListener("click", e=>{
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const a = el.dataset.action;
  const id = el.dataset.id;
  const key = el.dataset.key;

  const ADMIN_ONLY = ["new-member","edit-member","new-room","edit-room","new-service","edit-service","export","import","reset"];
  const LEADER_ANY  = ["new-schedule","new-event","new-event-on","edit-event"];
  if(ADMIN_ONLY.includes(a) && !isAdmin()){ toast("Apenas o administrador pode fazer isso","warn"); return; }
  if(LEADER_ANY.includes(a) && !isLeader()){ toast("Apenas líderes podem fazer isso","warn"); return; }

  switch(a){
    case "goto": go(el.dataset.view); break;
    case "open-occ": openSchedule(key); break;
    case "new-schedule": pickOccForSchedule(); break;
    case "open-member": openMember(id); break;
    case "new-member": editMember(null); break;
    case "edit-member": editMember(id); break;
    case "wa-member": waMember(id); break;
    case "ics-member": downloadIcs(id); break;
    case "ics-me": {
      if(!DB.settings.meId){ toast("Selecione 'Quem é você?' primeiro","warn"); break; }
      downloadIcs(DB.settings.meId); break;
    }
    case "mfilter": memberFilter=el.dataset.f; go("membros"); break;
    case "new-room": editRoom(null); break;
    case "edit-room": editRoom(id); break;
    case "new-service": editService(null); break;
    case "edit-service": editService(id); break;
    case "new-event": editEvent(null, calSelected); break;
    case "new-event-on": editEvent(null, el.dataset.date); break;
    case "edit-event": editEvent(id); break;
    case "sel-day": calSelected=el.dataset.date; go("calendario"); break;
    case "esc-prev": escMonth--; if(escMonth<0){escMonth=11;escYear--;} go("escala"); break;
    case "esc-next": escMonth++; if(escMonth>11){escMonth=0;escYear++;} go("escala"); break;
    case "esc-today": { const t=today(); escYear=t.getFullYear(); escMonth=t.getMonth(); go("escala"); } break;
    case "logout": doLogout(); break;
    case "cal-prev": calMonth--; if(calMonth<0){calMonth=11;calYear--;} go("calendario"); break;
    case "cal-next": calMonth++; if(calMonth>11){calMonth=0;calYear++;} go("calendario"); break;
    case "cal-today": { const t=today(); calYear=t.getFullYear(); calMonth=t.getMonth(); calSelected=ymd(t); go("calendario"); } break;
    case "enable-notif": case "toggle-notif": toggleNotif(); break;
    case "export": exportData(); break;
    case "import": document.getElementById("importFile").click(); break;
    case "reset": confirmReset(); break;
  }
});

function openModal(title, bodyHtml, footHtml){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("modalFoot").innerHTML = footHtml||"";
  const bd = document.getElementById("modalBackdrop");
  bd.hidden = false;
}
function closeModal(){ document.getElementById("modalBackdrop").hidden = true; }
document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("modalBackdrop").addEventListener("click", e=>{ if(e.target.id==="modalBackdrop") closeModal(); });

/* ---------- Modal: Membro (cadastro/edição) ---------- */
function editMember(mid){
  const m = mid ? getMember(mid) : {name:"",phone:"",role:"",roomIds:[],active:true,notes:"",photo:"",training:false};
  let photo = m.photo || "";
  const avaInner = photo ? `style="background-image:url('${photo}');background-size:cover;background-position:center"` : `style="background:${avaColor(m.id||'x')}"`;
  const body = `
    <div class="field" style="display:flex;align-items:center;gap:14px">
      <div class="ava" id="mPhotoPrev" style="width:64px;height:64px;font-size:22px;${photo?`background-image:url('${photo}');background-size:cover;background-position:center`:`background:${avaColor(m.id||'x')}`}">${photo?"":esc(initials(m.name||"?"))}</div>
      <div style="flex:1">
        <label style="margin-bottom:6px">Foto (opcional)</label>
        <div style="display:flex;gap:8px">
          <button type="button" class="btn btn-ghost" id="mPhotoBtn" style="padding:9px 13px;font-size:13px">${photo?"Trocar":"Adicionar"} foto</button>
          <button type="button" class="btn btn-soft" id="mPhotoDel" style="padding:9px 13px;font-size:13px;${photo?"":"display:none"}">Remover</button>
        </div>
        <input type="file" id="mPhotoInput" accept="image/*" hidden>
      </div>
    </div>
    <div class="field"><label>Nome completo</label><input id="mName" value="${esc(m.name)}" placeholder="Ex.: Ana Beatriz"></div>
    <div class="row2">
      <div class="field"><label>WhatsApp</label><input id="mPhone" value="${esc(m.phone)}" placeholder="81 99999-0000" inputmode="tel"></div>
      <div class="field"><label>Função</label><input id="mRole" value="${esc(m.role)}" placeholder="Operador, Editor..."></div>
    </div>
    <div class="field"><label>Áreas que pode atender</label>
      <div class="pick" id="mRooms">${DB.rooms.map(r=>`<span class="pick-item ${m.roomIds.includes(r.id)?"on":""}" data-room="${r.id}" style="${m.roomIds.includes(r.id)?`background:${r.fg}`:""}"><span class="pk-dot" style="background:${r.fg}"></span>${esc(r.name)}</span>`).join("")}</div>
    </div>
    <div class="field"><label>Observações</label><textarea id="mNotes" placeholder="Restrições de horário, preferências...">${esc(m.notes)}</textarea></div>
    <div class="toggle"><span class="toggle-label">Ativo na equipe</span><div class="sw ${m.active?"on":""}" id="mActive"></div></div>
    <div class="toggle"><span class="toggle-label">🎓 Em treinamento</span><div class="sw ${m.training?"on":""}" id="mTraining"></div></div>
  `;
  const foot = `<button class="btn btn-primary btn-block" id="mSave">${mid?"Salvar alterações":"Cadastrar"}</button>
    ${mid?`<button class="btn btn-danger btn-block" id="mDelete" style="margin-top:8px">Excluir da equipe</button>`:""}`;
  openModal(mid?"Editar pessoa":"Nova pessoa", body, foot);

  // foto: abrir seletor, redimensionar para miniatura e pré-visualizar
  const prev=document.getElementById("mPhotoPrev");
  const fileInput=document.getElementById("mPhotoInput");
  const delBtn=document.getElementById("mPhotoDel");
  document.getElementById("mPhotoBtn").addEventListener("click",()=>fileInput.click());
  fileInput.addEventListener("change", e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      const im=new Image();
      im.onload=()=>{
        const S=240, cv=document.createElement("canvas"); cv.width=S; cv.height=S;
        const ctx=cv.getContext("2d");
        const s=Math.min(im.width,im.height);
        const sx=(im.width-s)/2, sy=(im.height-s)/2;
        ctx.drawImage(im, sx,sy,s,s, 0,0,S,S);
        photo=cv.toDataURL("image/jpeg",0.82);
        prev.style.backgroundImage=`url('${photo}')`;
        prev.style.backgroundSize="cover"; prev.style.backgroundPosition="center";
        prev.textContent="";
        delBtn.style.display="";
        document.getElementById("mPhotoBtn").textContent="Trocar foto";
      };
      im.onerror=()=>toast("Não consegui ler essa imagem","warn");
      im.src=reader.result;
    };
    reader.readAsDataURL(file);
    e.target.value="";
  });
  delBtn.addEventListener("click",()=>{
    photo=""; prev.style.backgroundImage="none"; prev.style.background=avaColor(m.id||'x');
    prev.textContent=initials(document.getElementById("mName").value||"?");
    delBtn.style.display="none"; document.getElementById("mPhotoBtn").textContent="Adicionar foto";
  });

  // interações
  let selRooms = new Set(m.roomIds);
  document.getElementById("mRooms").addEventListener("click", e=>{
    const it=e.target.closest(".pick-item"); if(!it) return;
    const rid=it.dataset.room; const r=getRoom(rid);
    if(selRooms.has(rid)){ selRooms.delete(rid); it.classList.remove("on"); it.style.background=""; }
    else{ selRooms.add(rid); it.classList.add("on"); it.style.background=r.fg; }
  });
  let active = m.active;
  document.getElementById("mActive").addEventListener("click", e=>{ active=!active; e.target.classList.toggle("on",active); });
  let training = !!m.training;
  document.getElementById("mTraining").addEventListener("click", e=>{ training=!training; e.target.classList.toggle("on",training); });

  document.getElementById("mSave").addEventListener("click", async ()=>{
    const name=document.getElementById("mName").value.trim();
    if(!name){ toast("Coloque o nome da pessoa","warn"); return; }
    const data={ name, phone:document.getElementById("mPhone").value.trim(),
      role:document.getElementById("mRole").value.trim(), roomIds:[...selRooms],
      notes:document.getElementById("mNotes").value.trim(), active, photo, training };
    const member = mid ? {id:mid,...data} : {id:uid(),...data};
    const btn=document.getElementById("mSave"); btn.disabled=true; const o=btn.textContent; btn.textContent="Salvando...";
    try{ await Data.saveMember(member, !mid); closeModal(); go("membros"); toast(mid?"Pessoa atualizada":"Pessoa cadastrada","good"); }
    catch(e){ btn.disabled=false; btn.textContent=o; toast("Não salvou — "+e.message,"warn"); }
  });
  if(mid) document.getElementById("mDelete").addEventListener("click", async ()=>{
    if(!confirm("Excluir esta pessoa? Ela sairá das escalas futuras.")) return;
    try{ await Data.deleteMember(mid); closeModal(); go("membros"); toast("Pessoa removida","good"); }
    catch(e){ toast("Não removeu — "+e.message,"warn"); }
  });
}

/* ---------- Modal: Evento pontual ---------- */
function editEvent(eid, presetDate){
  const ev = eid ? DB.events.find(e=>e.id===eid) : {title:"",date:presetDate||ymd(today()),time:"",note:"",photo:"",color:EVENT_COLORS[0]};
  let ePhoto = ev.photo || "";
  let eColor = ev.color || EVENT_COLORS[0];
  const body = `
    <div class="field">
      <label>Foto do evento (opcional)</label>
      <div id="ePhotoPrev" class="event-photo-prev" style="${ePhoto?`background-image:url('${ePhoto}')`:""}">${ePhoto?"":'<span class="muted-txt">Sem foto</span>'}</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button type="button" class="btn btn-ghost" id="ePhotoBtn" style="padding:9px 13px;font-size:13px">${ePhoto?"Trocar":"Adicionar"} foto</button>
        <button type="button" class="btn btn-soft" id="ePhotoDel" style="padding:9px 13px;font-size:13px;${ePhoto?"":"display:none"}">Remover</button>
      </div>
      <input type="file" id="ePhotoInput" accept="image/*" hidden>
    </div>
    <div class="field"><label>Nome do evento</label><input id="eTitle" value="${esc(ev.title)}" placeholder="Ex.: Ensaio, Conferência, Gravação"></div>
    <div class="row2">
      <div class="field"><label>Data</label><input id="eDate" type="date" value="${ev.date}"></div>
      <div class="field"><label>Horário</label><input id="eTime" type="time" value="${ev.time||""}"></div>
    </div>
    <div class="field"><label>Detalhes</label><textarea id="eNote" placeholder="Local, instruções...">${esc(ev.note||"")}</textarea></div>
    <div class="field"><label>Cor no calendário</label>
      <div class="color-row" id="eColors">${EVENT_COLORS.map(c=>`<span class="color-dot ${eColor===c?"on":""}" data-color="${c}" style="background:${c}"></span>`).join("")}</div>
    </div>
  `;
  const foot = `<button class="btn btn-primary btn-block" id="eSave">${eid?"Salvar":"Criar evento"}</button>
    ${eid?`<button class="btn btn-danger btn-block" id="eDelete" style="margin-top:8px">Excluir evento</button>`:""}`;
  openModal(eid?"Editar evento":"Novo evento", body, foot);

  // foto do evento: seleciona, redimensiona (16:9) e pré-visualiza
  const ePrev=document.getElementById("ePhotoPrev");
  const eFile=document.getElementById("ePhotoInput");
  const eDel=document.getElementById("ePhotoDel");
  document.getElementById("ePhotoBtn").addEventListener("click",()=>eFile.click());
  eFile.addEventListener("change", ev2=>{
    const file=ev2.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      const im=new Image();
      im.onload=()=>{
        const W=480,H=270, cv=document.createElement("canvas"); cv.width=W; cv.height=H;
        const ctx=cv.getContext("2d");
        const s=Math.min(im.width/W, im.height/H);
        const sw=W*s, sh=H*s, sx=(im.width-sw)/2, sy=(im.height-sh)/2;
        ctx.drawImage(im, sx,sy,sw,sh, 0,0,W,H);
        ePhoto=cv.toDataURL("image/jpeg",0.82);
        ePrev.style.backgroundImage=`url('${ePhoto}')`; ePrev.innerHTML="";
        eDel.style.display=""; document.getElementById("ePhotoBtn").textContent="Trocar foto";
      };
      im.onerror=()=>toast("Não consegui ler essa imagem","warn");
      im.src=reader.result;
    };
    reader.readAsDataURL(file); ev2.target.value="";
  });
  eDel.addEventListener("click",()=>{
    ePhoto=""; ePrev.style.backgroundImage="none"; ePrev.innerHTML='<span class="muted-txt">Sem foto</span>';
    eDel.style.display="none"; document.getElementById("ePhotoBtn").textContent="Adicionar foto";
  });

  // seletor de cor do evento
  const colorRow=document.getElementById("eColors");
  if(colorRow) colorRow.addEventListener("click", e=>{
    const dot=e.target.closest(".color-dot"); if(!dot) return;
    eColor=dot.dataset.color;
    colorRow.querySelectorAll(".color-dot").forEach(d=>d.classList.toggle("on", d===dot));
  });

  document.getElementById("eSave").addEventListener("click", async ()=>{
    const title=document.getElementById("eTitle").value.trim();
    const date=document.getElementById("eDate").value;
    if(!title){ toast("Dê um nome ao evento","warn"); return; }
    if(!date){ toast("Escolha a data","warn"); return; }
    const data={ title, date, time:document.getElementById("eTime").value, note:document.getElementById("eNote").value.trim(), photo:ePhoto, color:eColor };
    const evt = eid ? {id:eid,...data} : {id:uid(),...data};
    calSelected=date;
    try{ await Data.saveEvent(evt, !eid); closeModal(); go("calendario"); toast(eid?"Evento atualizado":"Evento criado","good"); }
    catch(e){ toast("Não salvou — "+e.message,"warn"); }
  });
  if(eid) document.getElementById("eDelete").addEventListener("click", async ()=>{
    if(!confirm("Excluir este evento?")) return;
    try{ await Data.deleteEvent(eid); closeModal(); go("calendario"); toast("Evento removido","good"); }
    catch(e){ toast("Não removeu — "+e.message,"warn"); }
  });
}
