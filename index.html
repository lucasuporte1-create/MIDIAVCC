/* ---------- Modal: Montar/Ver escala de uma ocorrência ---------- */
function openSchedule(key){
  const occ = resolveOcc(key);
  if(!occ){ toast("Não encontrei este culto","warn"); return; }
  if(!canEditAnyRoom()){ return openScheduleReadOnly(key, occ); }

  // cópia editável já no formato {lider, monitores[]}
  const sched={};
  DB.rooms.forEach(r=>{ const sl=roomSlot(key,r.id); sched[r.id]={lider:sl.lider, monitores:[...sl.monitores]}; });

  const shortName=m=>esc(m.name.split(" ")[0])+(m.name.split(" ")[1]?" "+m.name.split(" ")[1][0]+".":"");
  function availFor(r){ return DB.members.filter(m=>m.active).filter(m=>!m.roomIds.length||m.roomIds.includes(r.id)).sort((a,b)=>a.name.localeCompare(b.name,"pt")); }

  function renderBody(){
    return DB.rooms.map(r=>{
      const slot=sched[r.id];
      const count=(slot.lider?1:0)+slot.monitores.length;
      const editable=canEditRoom(r.id);
      const header=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <div class="room-ico" style="width:38px;height:38px;border-radius:11px;font-size:18px;background:${r.bg};color:${r.fg}">${r.emoji}</div>
          <div style="flex:1"><div class="room-name" style="font-size:14.5px">${esc(r.name)}</div>
            <div class="room-age">${count}/3 ${count===3?"✓":""}${editable?"":' • <span style="color:var(--ink-faint)">🔒 outra área</span>'}</div></div>
        </div>`;
      if(!editable){
        const nm=id=>{ const m=getMember(id); return m?shortName(m):""; };
        const liderRO = slot.lider?`<span class="pick-item on" style="background:${r.fg}">★ ${nm(slot.lider)}</span>`:'<span class="muted-txt">—</span>';
        const monRO = slot.monitores.length?slot.monitores.map(id=>`<span class="pick-item on" style="background:${r.fg}">${nm(id)}</span>`).join(""):'<span class="muted-txt">—</span>';
        return `<div class="card" style="padding:13px;margin-bottom:11px;opacity:.7">
          ${header}
          <div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:8px 0 6px"><span style="color:var(--sun)">★</span> Responsável</div>
          <div class="pick">${liderRO}</div>
          <div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:12px 0 6px">Auxiliares</div>
          <div class="pick">${monRO}</div>
        </div>`;
      }
      const avail=availFor(r);
      const liderG = avail.length ? avail.map(m=>{ const on=slot.lider===m.id;
          return `<span class="pick-item ${on?"on":""}" data-mid="${m.id}" style="${on?`background:${r.fg}`:""}">${on?"★ ":""}${shortName(m)}</span>`; }).join("")
        : '<span class="muted-txt">Ninguém apto a esta área</span>';
      const monG = avail.length ? avail.map(m=>{ const on=slot.monitores.includes(m.id);
          return `<span class="pick-item ${on?"on":""}" data-mid="${m.id}" style="${on?`background:${r.fg}`:""}">${shortName(m)}</span>`; }).join("")
        : '<span class="muted-txt">Ninguém apto a esta área</span>';
      return `<div class="card" style="padding:13px;margin-bottom:11px">
        ${header}
        <div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:8px 0 6px"><span style="color:var(--sun)">★</span> Responsável</div>
        <div class="pick" data-grp="lider" data-room="${r.id}">${liderG}</div>
        <div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:12px 0 6px">Auxiliares <span style="font-weight:500">(até 2)</span></div>
        <div class="pick" data-grp="monitor" data-room="${r.id}">${monG}</div>
      </div>`;
    }).join("");
  }

  const head = `${occ.photo?`<div class="occ-banner" style="background-image:url('${occ.photo}')"></div>`:""}<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div class="room-ico" style="width:42px;height:42px;border-radius:12px;background:${occ.color}22;color:${occ.color}">${occ.type==="evento"?"🎉":"⛪"}</div>
    <div><div style="font-family:var(--font-display);font-weight:700;font-size:16px">${esc(occ.title)}</div>
    <div class="muted-txt">${fmtLong(occ.date)} ${occ.time?"• "+occ.time:""}</div></div></div>`;

  openModal("Escala do culto", head + `<div id="schedRooms">${renderBody()}</div>`,
    `<button class="btn btn-wa btn-block btn-attn" id="schedWa" style="margin-bottom:10px">
       <svg viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 0 1-12.6 7.4L3 21l2.2-5.3A8.5 8.5 0 1 1 21 11.5z"/></svg> Avisar escalados no WhatsApp</button>
     <button class="btn btn-primary btn-block" id="schedSave">Salvar escala</button>`);

  const wrap=document.getElementById("schedRooms");
  function paint(){ wrap.innerHTML=renderBody(); }
  wrap.addEventListener("click", e=>{
    const it=e.target.closest(".pick-item[data-mid]"); if(!it) return;
    const grpEl=it.closest("[data-grp]"); if(!grpEl) return;
    const grp=grpEl.dataset.grp, rid=grpEl.dataset.room, mid=it.dataset.mid;
    const slot=sched[rid];
    if(grp==="lider"){
      if(slot.lider===mid) slot.lider=null;
      else { slot.lider=mid; slot.monitores=slot.monitores.filter(x=>x!==mid); }
    } else {
      if(slot.monitores.includes(mid)) slot.monitores=slot.monitores.filter(x=>x!==mid);
      else {
        if(slot.lider===mid) slot.lider=null;
        if(slot.monitores.length>=2){ toast("Máximo de 2 auxiliares por área","warn"); return; }
        slot.monitores.push(mid);
      }
    }
    paint();
  });

  async function commit(){
    const scope = isAdmin() ? null : DB.rooms.filter(r=>canEditRoom(r.id)).map(r=>r.id);
    if(!scope){ Object.keys(sched).forEach(rid=>{ const s=sched[rid]; if(!s.lider && !s.monitores.length) delete sched[rid]; }); }
    await Data.saveSchedule(key, occ, sched, scope);
  }
  document.getElementById("schedSave").addEventListener("click", async ()=>{
    const btn=document.getElementById("schedSave"); btn.disabled=true; const o=btn.textContent; btn.textContent="Salvando...";
    try{ await commit(); closeModal(); go(currentView); toast("Escala salva","good"); }
    catch(e){ btn.disabled=false; btn.textContent=o; toast("Não salvou — "+e.message,"warn"); }
  });
  document.getElementById("schedWa").addEventListener("click", async ()=>{
    try{ await commit(); }catch(e){ toast("Não salvou — "+e.message,"warn"); return; }
    waSchedule(key, occ);
  });
}

    <div class="room-ico" style="width:42px;height:42px;border-radius:12px;background:${occ.color}22;color:${occ.color}">${occ.type==="evento"?"🎉":"⛪"}</div>
    <div><div style="font-family:var(--font-display);font-weight:700;font-size:16px">${esc(occ.title)}</div>
    <div class="muted-txt">${fmtLong(occ.date)} ${occ.time?"• "+occ.time:""}</div></div></div>`;

  let body = "";
  const rooms = DB.rooms.filter(r=>roomPeopleIds(key,r.id).length);
  if(!rooms.length){ body = `<p class="muted-txt" style="text-align:center;padding:20px">Escala ainda não definida pelo líder.</p>`; }
  else rooms.forEach(r=>{

    const mineHere = me && roomPeopleIds(key,r.id).includes(me.id);
    const chip=(id,isLeader)=>{ const p=getMember(id); if(!p) return "";
      return `<span class="chip ${me&&id===me.id?"good":""}" style="margin:2px 4px 2px 0">${ava(p.name,p.id,"width:22px;height:22px;font-size:10px;margin-right:4px")}${isLeader?"★ ":""}${esc(p.name)}</span>`; };
    body += `<div class="card" style="padding:13px;margin-bottom:11px${mineHere?";border-color:#BFE9D7;background:var(--good-soft)":""}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="room-ico" style="width:34px;height:34px;border-radius:10px;font-size:16px;background:${r.bg};color:${r.fg}">${r.emoji}</div>
        <div class="room-name" style="font-size:14.5px">${esc(r.name)} ${mineHere?"<span class='chip good'>você</span>":""}</div>
      </div>
      <div style="font-size:11.5px;font-weight:700;color:var(--ink-faint);margin-bottom:3px">RESPONSÁVEL</div>
      <div>${slot.lider?chip(slot.lider,true):'<span class="muted-txt" style="font-size:12.5px">—</span>'}</div>
      <div style="font-size:11.5px;font-weight:700;color:var(--ink-faint);margin:8px 0 3px">AUXILIARES</div>
      <div>${slot.monitores.length?slot.monitores.map(id=>chip(id,false)).join(""):'<span class="muted-txt" style="font-size:12.5px">—</span>'}</div>
    </div>`;
  });

  openModal("Escala do culto", head+body,
    me ? `<button class="btn btn-ghost btn-block" data-action="ics-me"><svg viewBox="0 0 24 24"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M8 2.5v4M16 2.5v4M3.5 9.5h17"/></svg> Pôr meus dias no calendário</button>` : "");
}

function resolveOcc(key){
  if(key.startsWith("e:")){ const ev=DB.events.find(e=>e.id===key.slice(2)); if(!ev) return null;
    return {key,date:ev.date,title:ev.title,time:ev.time,color:ev.color||"#FF8A1E",type:"evento",photo:ev.photo||""}; }
  if(key.startsWith("s:")){ const [,sid,date]=key.split(":"); const s=getService(sid); if(!s) return null;
    return {key,date,title:s.name,time:s.time,color:s.color,type:"culto"}; }
  return null;
}

/* =====================================================================
   WHATSAPP
   ===================================================================== */
function waMember(mid){
  const m=getMember(mid); if(!m) return;
  if(!m.phone){ toast("Esta pessoa não tem WhatsApp cadastrado","warn"); return; }
  const msg = `Oi ${m.name.split(" ")[0]}! Tudo bem? Mensagem do ${DB.settings.dept} da ${DB.settings.church}. 💙`;
  window.open(`https://wa.me/${cleanPhone(m.phone)}?text=${encodeURIComponent(msg)}`,"_blank");
}
function waSchedule(key, occ){
  const sched=schedFor(key);
  const people=[];
  Object.keys(sched).forEach(rid=>{ const r=getRoom(rid); if(!r) return;
    const slot=roomSlot(key,rid);
    [slot.lider, ...slot.monitores].filter(Boolean).forEach(mid=>{
      const m=getMember(mid); if(m&&m.phone) people.push({m,r,role:memberRoleInRoom(key,rid,mid)}); });
  });
  if(!people.length){ toast("Ninguém com WhatsApp nesta escala","warn"); return; }
  const body = `<p class="muted-txt" style="margin:0 0 12px">Toque para abrir o WhatsApp de cada pessoa com a mensagem pronta.</p>
    ${people.map(({m,r,role})=>`<div class="person">
      ${ava(m.name,m.id)}
      <div class="person-info"><div class="person-name">${esc(m.name)}</div><div class="person-meta">${r.emoji} ${esc(r.name)} • ${role}</div></div>
      <button class="btn btn-wa" data-wa-one="${m.id}" data-room="${r.id}" style="padding:9px 13px;font-size:13px">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 0 1-12.6 7.4L3 21l2.2-5.3A8.5 8.5 0 1 1 21 11.5z"/></svg> Avisar</button>
    </div>`).join("")}`;
  openModal("Avisar escalados", body, "");
  document.getElementById("modalBody").querySelectorAll("[data-wa-one]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const m=getMember(btn.dataset.waOne); const r=getRoom(btn.dataset.room);
      const role=memberRoleInRoom(key, btn.dataset.room, btn.dataset.waOne)||"Voluntário";
      const msg = `Oi ${m.name.split(" ")[0]}! 💙 Lembrete da escala do ${DB.settings.dept}:\n\n📅 ${fmtLong(occ.date)}\n⛪ ${occ.title}${occ.time?" às "+occ.time:""}\n📍 Área: ${r.name}\n🙋 Função: ${role}\n\nConto com você! Deus abençoe.`;
      window.open(`https://wa.me/${cleanPhone(m.phone)}?text=${encodeURIComponent(msg)}`,"_blank");
    });
  });
}

/* =====================================================================
   LEMBRETE NO CALENDÁRIO (.ics) — notificação nativa do celular, sem servidor
   ===================================================================== */
function icsEsc(s){ return String(s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n"); }

function icsForMember(mid, days=60){
  const m=getMember(mid); if(!m) return {ics:null,count:0};
  const occs=upcomingOccs(days);
  const stamp=new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Escala Midia//Verbo Casa Caiada//PT-BR","CALSCALE:GREGORIAN","METHOD:PUBLISH"];
  let count=0;
  occs.forEach(o=>{
    const s=schedFor(o.key);
    const rids=Object.keys(s).filter(rid=>roomPeopleIds(o.key,rid).includes(mid));
    if(!rids.length) return;
    const partes=rids.map(rid=>{ const r=getRoom(rid); const role=memberRoleInRoom(o.key,rid,mid);
      return r?`${r.name} (${role})`:""; }).filter(Boolean).join(", ");
    const [Y,Mo,Da]=o.date.split("-");
    const t=(o.time||"09:00").split(":");
    const hh=String(t[0]).padStart(2,"0"), mm=String(t[1]||"00").padStart(2,"0");
    const start=`${Y}${Mo}${Da}T${hh}${mm}00`;
    let eh=Math.min(23,parseInt(hh)+2);
    const end=`${Y}${Mo}${Da}T${String(eh).padStart(2,"0")}${mm}00`;
    count++;
    L.push("BEGIN:VEVENT",
      `UID:${o.key.replace(/[^a-z0-9]/gi,"")}-${mid}@escalakids`,
      `DTSTAMP:${stamp}`, `DTSTART:${start}`, `DTEND:${end}`,
      `SUMMARY:${icsEsc("Escala Mídia — "+partes)}`,
      `DESCRIPTION:${icsEsc(o.title+(o.time?" às "+o.time:"")+" • "+partes+" • "+DB.settings.church)}`,
      "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:Hoje você está escalado na Mídia 💙","TRIGGER:-PT2H","END:VALARM",
      "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:Lembrete: você está escalado na Mídia","TRIGGER:-PT15H","END:VALARM",
      "END:VEVENT");
  });
  L.push("END:VCALENDAR");
  return {ics:L.join("\r\n"), count};
}

function downloadIcs(mid){
  const m=getMember(mid); if(!m) return;
  const r=icsForMember(mid);
  if(!r.count){ toast("Sem escalas futuras para esta pessoa","warn"); return; }
  const blob=new Blob([r.ics],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url;
  a.download=`escala-${m.name.split(" ")[0].toLowerCase()}.ics`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast(r.count+" lembrete(s) para o calendário","good");
}

/* =====================================================================
   NOTIFICAÇÕES
   ===================================================================== */
async function toggleNotif(){
  if(!("Notification" in window)){ toast("Este aparelho não suporta notificações","warn"); return; }
  if(DB.settings.notify){ DB.settings.notify=false; save(); go(currentView); toast("Lembretes desativados"); return; }
  let perm = Notification.permission;
  if(perm!=="granted") perm = await Notification.requestPermission();
  if(perm==="granted"){ DB.settings.notify=true; save(); go(currentView);
    toast("Pronto! Você será lembrado nos seus dias.","good"); checkTodayReminder(true); }
  else toast("Permissão de notificação negada no navegador","warn");
}
async function swReady(){
  if(!("serviceWorker" in navigator)) return null;
  try{
    return await Promise.race([
      navigator.serviceWorker.ready,
      new Promise(res=>setTimeout(()=>res(null), 1500))   // não trava se o SW demorar/não existir
    ]);
  }catch(e){ return null; }
}
async function checkTodayReminder(force){
  if(!DB.settings.notify || !DB.settings.meId) return;
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  const me=getMember(DB.settings.meId); if(!me) return;
  const occs=occsOnDate(ymd(today()));
  const mine=[];
  occs.forEach(o=>{ const s=schedFor(o.key);
    Object.keys(s).forEach(rid=>{ if(roomPeopleIds(o.key,rid).includes(me.id)){ const r=getRoom(rid);
      mine.push(`${o.title} • ${r?r.name:""} • ${memberRoleInRoom(o.key,rid,me.id)}`); } }); });
  if(!mine.length) return;
  const flag = "notif-midia-"+ymd(today());
  if(!force && localStorage.getItem(flag)) return;
  const title = "Você está escalado hoje! 💙";
  const opts  = { body: mine.join("\n"), icon:"icon-192.png", badge:"icon-192.png", tag:flag, renotify:true };
  let shown=false;
  const reg = await swReady();                 // espera o service worker ficar pronto (celular)
  if(reg && reg.showNotification){
    try{ await reg.showNotification(title, opts); shown=true; }catch(e){}
  }
  if(!shown){                                  // fallback (desktop)
    try{ new Notification(title, opts); shown=true; }catch(e){}
  }
  if(shown) localStorage.setItem(flag,"1");     // só marca se a notificação REALMENTE apareceu
}

function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url;
  a.download=`escala-kids-backup-${ymd(today())}.json`; a.click();
  URL.revokeObjectURL(url); toast("Backup salvo","good");
}
function handleImportFile(e){
  const file=e.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const data=JSON.parse(rd.result);
      if(!data.rooms||!data.members) throw 0;
      DB=data; save(); go("home"); toast("Dados restaurados","good");
    }catch(err){ toast("Arquivo inválido","warn"); } };
  rd.readAsText(file); e.target.value="";
}
function confirmReset(){
  if(!confirm("Isso apaga TODOS os dados (equipe, salas, escalas). Tem certeza?")) return;
  if(!confirm("Confirma mesmo? Não dá para desfazer.")) return;
  localStorage.removeItem(STORE_KEY); DB=seed(); save(); go("home"); toast("Tudo recomeçado","good");
}

/* =====================================================================
   TOAST
   ===================================================================== */
let toastT;
function toast(msg,type){
  const el=document.getElementById("toast");
  el.textContent=msg; el.className="toast"+(type?" "+type:""); el.hidden=false;
  requestAnimationFrame(()=>el.classList.add("show"));
  clearTimeout(toastT);
  toastT=setTimeout(()=>{ el.classList.remove("show"); setTimeout(()=>el.hidden=true,260); },2600);
}

/* =====================================================================
   LOGIN / SESSÃO
   ===================================================================== */
function showLogin(){
  const lg=document.getElementById("login"), ap=document.getElementById("app");
  if(ap) ap.hidden=true; if(lg) lg.hidden=false;
}
function hideLogin(){
  const lg=document.getElementById("login"), ap=document.getElementById("app");
  if(lg) lg.hidden=true; if(ap) ap.hidden=false;
}
function startApp(){ go("home"); checkTodayReminder(false); }
async function enterApp(){
  if(CLOUD){
    try{ await Data.loadAll(); }
    catch(e){
      DB.members=[]; DB.rooms=[]; DB.services=[]; DB.events=[]; DB.schedules={}; save();
      toast("Não consegui carregar do Supabase ("+e.message+"). Conferir o supabase-schema.sql.","warn");
    }
  }
  hideLogin();
  // vínculo automático: se a conta está amarrada a um voluntário, define "quem é você"
  if(Auth.memberId && getMember(Auth.memberId)){ DB.settings.meId = Auth.memberId; save(); }
  startApp();
}
async function doLogout(){
  await Auth.signOut();
  const e=document.getElementById("loginEmail"), p=document.getElementById("loginPass");
  if(e) e.value=""; if(p) p.value="";
  showLogin();
}

async function enterAppAnimated(){
  showEnterSplash();
  const minWait = new Promise(r=>setTimeout(r, 1100)); // garante a logo girando por ~1,1s
  try{ await enterApp(); }catch(e){}
  await minWait;
  hideEnterSplash();
}
async function gateEnter(){
  if(USE_SUPABASE && Auth.mustChange){ showChangePassword(); return; }
  await enterAppAnimated();
}
async function applyPasswordChange(newPass){
  // troca a senha E grava a marca pw_set nos metadados do usuário (na mesma chamada).
  // Isso sempre é permitido para o próprio usuário, então não depende da tabela/RLS.
  const { error } = await sb.auth.updateUser({ password: newPass, data: { pw_set: true } });
  if(error) throw new Error(traduzErroAuth(error.message));
  // também tenta limpar na tabela (pra ficar bonito no relatório), sem depender disso
  try{ await sb.from("profiles").update({ must_change_password:false }).eq("id", Auth.user.id); }catch(_){}
  Auth.mustChange=false;
}
function showChangePassword(){
  const lg=document.getElementById("login"); if(lg) lg.hidden=true;
  const ap=document.getElementById("app"); if(ap) ap.hidden=true;
  let ov=document.getElementById("changePass");
  if(!ov){ ov=document.createElement("div"); ov.id="changePass"; ov.className="login"; document.body.appendChild(ov); }
  ov.style.display="flex";
  ov.innerHTML=`<div class="login-card">
    <h1>Crie sua senha</h1>
    <p class="login-sub">Primeiro acesso — defina uma senha só sua</p>
    <div class="field"><label>Nova senha</label><input id="cpNew" type="password" autocomplete="new-password" placeholder="mínimo 6 caracteres"></div>
    <div class="field"><label>Repita a senha</label><input id="cpNew2" type="password" autocomplete="new-password" placeholder="••••••••"></div>
    <div class="login-btn-wrap"><button id="cpBtn" class="btn btn-primary btn-block">Salvar e entrar</button></div>
    <div id="cpErr" class="login-err"></div>
  </div>`;
  const btn=ov.querySelector("#cpBtn"), err=ov.querySelector("#cpErr");
  async function done(){
    const a=ov.querySelector("#cpNew").value, b=ov.querySelector("#cpNew2").value;
    err.textContent="";
    if(a.length<6){ err.textContent="Use ao menos 6 caracteres."; return; }
    if(a!==b){ err.textContent="As senhas não conferem."; return; }
    btn.disabled=true; const o=btn.textContent; btn.textContent="Salvando...";
    try{ await applyPasswordChange(a); ov.style.display="none"; await enterAppAnimated(); }
    catch(e){ btn.disabled=false; btn.textContent=o; err.textContent=e.message||"Não consegui salvar."; }
  }
  btn.addEventListener("click", done);
  ov.querySelector("#cpNew2").addEventListener("keydown",e=>{ if(e.key==="Enter") done(); });
}
function showEnterSplash(){
  let s=document.getElementById("enterSplash");
  if(!s){
    s=document.createElement("div"); s.id="enterSplash"; s.className="enter-splash";
    const logoEl=document.querySelector(".login-logo");
    const logoSrc=logoEl?logoEl.src:"";
    s.innerHTML=`<div class="enter-splash-inner">
      ${logoSrc?`<img class="enter-splash-logo" src="${logoSrc}" alt="">`:""}
    </div>`;
    document.body.appendChild(s);
  }
  s.style.display="flex"; s.classList.remove("hide");
  requestAnimationFrame(()=>s.classList.add("show"));
}
function hideEnterSplash(){
  const s=document.getElementById("enterSplash"); if(!s) return;
  s.classList.remove("show"); s.classList.add("hide");
  setTimeout(()=>{ s.style.display="none"; s.classList.remove("hide"); }, 500);
}

function wireLogin(){
  const btn=document.getElementById("loginBtn");
  const err=document.getElementById("loginErr");
  const email=document.getElementById("loginEmail");
  const pass=document.getElementById("loginPass");
  if(!btn) return;
  async function submit(){
    err.textContent="";
    btn.disabled=true; const orig=btn.textContent; btn.textContent="Entrando...";
    try{
      await Auth.signIn(email.value.trim(), pass.value);
      await gateEnter();                        // 1º acesso: troca senha; senão entra com a logo girando
    }catch(e){ err.textContent = e.message || "Não foi possível entrar."; }
    finally{ btn.disabled=false; btn.textContent=orig; }
  }
  btn.addEventListener("click", submit);
  pass.addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
  email.addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
}

/* =====================================================================
   INIT
   ===================================================================== */
(async function init(){
  wireLogin();
  await Auth.init();
  if(Auth.user){ await gateEnter(); }
  else showLogin();
})();
