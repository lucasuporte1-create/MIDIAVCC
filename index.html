<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0D0D0F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Escala Mídia" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Escala Mídia — Verbo Casa Caiada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Supabase JS (só age quando você preencher URL/chave no app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Tela de login (some quando autenticado) -->
  <div id="login" class="login" hidden>
    <img class="brand-logo brand-logo-corner" src="logo-verbo.png" alt="Verbo da Vida" />
    <div class="login-card">
      <img class="login-logo" src="logo-login.png" alt="Mídia" />
      <h1>Escala Mídia</h1>
      <p class="login-sub">Entre para acessar a escala</p>
      <div class="field"><label>E-mail</label>
        <input id="loginEmail" type="email" inputmode="email" autocomplete="username" placeholder="voce@email.com" /></div>
      <div class="field"><label>Senha</label>
        <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••" /></div>
      <div class="login-btn-wrap">
        <button id="loginBtn" class="btn btn-primary btn-block">Entrar</button>
      </div>
      <div id="loginErr" class="login-err"></div>
    </div>
  </div>

  <div id="app" hidden>
    <!-- Topo -->
    <header class="topbar" id="topbar">
      <div class="topbar-inner">
        <div class="topbar-titles">
          <span class="topbar-eyebrow" id="topEyebrow">Verbo Casa Caiada</span>
          <h1 class="topbar-title" id="topTitle">Início</h1>
        </div>
        <div class="topbar-actions" id="topActions"></div>
        <img class="brand-logo" src="logo-verbo.png" alt="Verbo da Vida" />
      </div>
    </header>

    <!-- Conteúdo das telas -->
    <main class="content" id="content"></main>

    <!-- Navegação inferior -->
    <nav class="tabbar" id="tabbar">
      <button class="tab is-active" data-view="home" aria-label="Início">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Início</span>
      </button>
      <button class="tab" data-view="escala" aria-label="Escala">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9h17"/><path d="M8 14h3M8 17h6"/></svg>
        <span>Escala</span>
      </button>
      <button class="tab" data-view="calendario" aria-label="Calendário">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M8 2.5v4M16 2.5v4M3.5 9.5h17"/></svg>
        <span>Agenda</span>
      </button>
      <button class="tab" data-view="membros" aria-label="Membros">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20c0-3.3 2.5-5.5 5.5-5.5s5.5 2.2 5.5 5.5"/><path d="M16 5.2a3 3 0 0 1 0 5.6M17 14.6c2.3.5 3.9 2.3 3.9 5"/></svg>
        <span>Equipe</span>
      </button>
      <button class="tab" data-view="config" aria-label="Mais">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 12a7.4 7.4 0 0 0-.1-1.4l1.9-1.5-1.9-3.3-2.3.9a7.4 7.4 0 0 0-2.4-1.4L14.1 2H9.9l-.4 2.4a7.4 7.4 0 0 0-2.4 1.4l-2.3-.9-1.9 3.3L4.7 10a7.4 7.4 0 0 0 0 2.8l-1.9 1.5 1.9 3.3 2.3-.9a7.4 7.4 0 0 0 2.4 1.4l.4 2.4h4.2l.4-2.4a7.4 7.4 0 0 0 2.4-1.4l2.3.9 1.9-3.3-1.9-1.5c.1-.4.1-.9.1-1.3z"/></svg>
        <span>Mais</span>
      </button>
    </nav>
  </div>

  <!-- Modal genérico -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 class="modal-title" id="modalTitle">Título</h2>
        <button class="icon-btn" id="modalClose" aria-label="Fechar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
